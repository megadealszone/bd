<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#007bff,#00c6ff);
min-height:100vh;
padding:20px;
}

.container{max-width:1000px;margin:auto;}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

h2{text-align:center;color:#fff;margin-bottom:15px;}

input{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.btn{background:#28a745;color:white;width:100%;}

.top-box{
display:grid;
grid-template-columns:1fr 1fr auto;
gap:10px;
margin-bottom:15px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th{
background:#007bff;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

.download-btn{
background:#007bff;
color:white;
padding:6px 12px;
border-radius:8px;
}

.delete-btn{
background:red;
color:white;
padding:6px 10px;
border-radius:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>🔐 পাসওয়ার্ড দিয়ে লগইন করুন</h2>
<input type="password" id="loginPass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
<h2>📥 Software Download Dashboard</h2>

<!-- ADMIN ADD SECTION -->
<div id="adminPanel" class="top-box hidden">
<input type="text" id="softName" placeholder="Software Name">
<input type="text" id="softLink" placeholder="Download Link">
<button onclick="addSoft()" style="background:#28a745;color:white;">Add</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Software</th>
<th>Download</th>
<th id="deleteHead" class="hidden">Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

</div>

</div>

<script>

const ADMIN_PASS = "5101";
const DOWNLOAD_PASS = "5102";

let isAdmin = false;

function login(){

let pass = document.getElementById("loginPass").value;

if(pass === ADMIN_PASS){
isAdmin = true;
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
document.getElementById("deleteHead").classList.remove("hidden");
loadData();
}else{
alert("❌ Wrong Password");
}
}

function getData(){
return JSON.parse(localStorage.getItem("softDB")) || [];
}

function saveData(d){
localStorage.setItem("softDB",JSON.stringify(d));
}

function loadData(){

let data = getData();

if(data.length===0){
data = [
{name:"Sample Software 1",link:"https://drive.google.com/file/d/1hiHbJxLPOuiaGfCLIjXnNr-UyTYIB119/view"},
{name:"Sample Software 2",link:"https://drive.google.com/file/d/1hiHbJxLPOuiaGfCLIjXnNr-UyTYIB119/view"},
{name:"Sample Software 3",link:"https://drive.google.com/file/d/1hiHbJxLPOuiaGfCLIjXnNr-UyTYIB119/view"},
{name:"Photoshop 8 CS",link:"https://drive.google.com/file/d/1hiHbJxLPOuiaGfCLIjXnNr-UyTYIB119/view"}
];
saveData(data);
}

render();
}

function render(){

let data = getData();
let list = document.getElementById("list");
list.innerHTML="";

data.forEach((item,i)=>{

let tr = document.createElement("tr");

tr.innerHTML=`
<td>${i+1}</td>
<td>${item.name}</td>
<td><button class="download-btn">Download</button></td>
${isAdmin ? `<td><button class="delete-btn">Delete</button></td>` : ``}
`;

list.appendChild(tr);

// download
tr.querySelector(".download-btn").onclick = function(){

let p = prompt("Password দিন (Download)");

if(p === DOWNLOAD_PASS){
window.open(item.link,"_blank");
}else{
alert("❌ সঠিক পাসওয়ার্ড দিন");
}
};

// delete (admin only)
if(isAdmin){
tr.querySelector(".delete-btn").onclick = function(){
let d = getData();
d.splice(i,1);
saveData(d);
render();
};
}

});

}

function addSoft(){

let name = document.getElementById("softName").value;
let link = document.getElementById("softLink").value;

if(name=="" || link==""){
alert("সব তথ্য দিন");
return;
}

let data = getData();
data.push({name,link});
saveData(data);

document.getElementById("softName").value="";
document.getElementById("softLink").value="";

render();
}

</script>

</body>
</html>
