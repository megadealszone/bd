<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Software Download List</title>

<style>
    body{
        font-family: Arial;
        background: linear-gradient(135deg,#0f172a,#1e293b);
        color: white;
        margin:0;
        padding:20px;
    }

    .container{
        max-width: 900px;
        margin:auto;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    /* SEARCH BOX */
    .search-box{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border-radius:8px;
        border:none;
        outline:none;
        font-size:16px;
    }

    table{
        width:100%;
        border-collapse: collapse;
        background:#111827;
        border-radius:10px;
        overflow:hidden;
    }

    th, td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #374151;
    }

    th{
        background:#1f2937;
    }

    .btn{
        padding:8px 14px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        background:#22c55e;
        color:white;
        font-weight:bold;
    }

    .btn:hover{
        background:#16a34a;
    }

    /* Modal */
    .modal{
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.7);
        justify-content:center;
        align-items:center;
    }

    .modal-box{
        background:#0f172a;
        padding:20px;
        border-radius:10px;
        text-align:center;
        width:300px;
    }

    input{
        width:90%;
        padding:10px;
        margin-top:10px;
        border-radius:5px;
        border:none;
    }

    .submit-btn{
        margin-top:10px;
        background:#3b82f6;
    }

</style>
</head>

<body>

<div class="container">
    <h1>📦 Software Download List</h1>

    <!-- 🔎 SEARCH BOX -->
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 সফটওয়্যার খুঁজুন..." onkeyup="searchTable()">

    <table id="softwareTable">
        <tr>
            <th>ক্রমিক নং</th>
            <th>সফটওয়্যার নাম</th>
            <th>ডিটেলস</th>
            <th>ডাউনলোড</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Adobe Photoshop </td>
            <td>8 cs</td>
            <td><button class="btn" onclick="openModal('https://drive.google.com/uc?export=download&id=1hiHbJxLPOuiaGfCLIjXnNr-UyTYIB119')">Download</button></td>
        </tr>

        <tr><td>2</td><td>Adobe Photoshop </td><td>2020 v21.0.3.91 (x64)</td>
            <td><button class="btn" onclick="openModal('https://drive.google.com/uc?export=download&id=1cWxeVDXrhqJkYQzaPivS7M3dK1xLMXfT')">Download</button></td>
        </tr>
        <tr> <td>3</td><td>KM Player </td> <td>High version</td>
            <td><button class="btn" onclick="openModal('https://drive.google.com/uc?export=download&id=1rIfC567tEtMdZFdyHxYCPMqWsza3E_jN')">Download</button></td>
        </tr>
        <tr><td>4</td><td>KM Player </td> <td> 4.0.7.1</td>
            <td><button class="btn" onclick="openModal('https://drive.google.com/uc?export=download&id=1yn4oRmvPlwdKugu0Ytm8Og-sYRStSn9V')">Download</button></td>
        </tr>                                          

    </table>
</div>

<!-- Password Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3>🔒 Password দিন</h3>
        <input type="password" id="password" placeholder="Enter Password">
        <br>
        <button class="btn submit-btn" onclick="checkPassword()">Submit</button>
    </div>
</div>

<script>
    let downloadLink = "";

    function openModal(link){
        downloadLink = link;
        document.getElementById("modal").style.display = "flex";
    }

    function checkPassword(){
        let pass = document.getElementById("password").value;

        if(pass === "5102"){
            window.location.href = downloadLink;
        } else {
            alert("❌ ভুল পাসওয়ার্ড!");
        }
    }

    window.onclick = function(e){
        let modal = document.getElementById("modal");
        if(e.target === modal){
            modal.style.display = "none";
        }
    }

    // 🔎 SEARCH FUNCTION
    function searchTable(){
        let input = document.getElementById("searchInput");
        let filter = input.value.toLowerCase();
        let table = document.getElementById("softwareTable");
        let tr = table.getElementsByTagName("tr");

        for(let i = 1; i < tr.length; i++){
            let td = tr[i].getElementsByTagName("td")[1];
            if(td){
                let textValue = td.textContent || td.innerText;
                if(textValue.toLowerCase().indexOf(filter) > -1){
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
</script>

</body>
</html>
