<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Download Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#007bff,#00c6ff);
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
animation:fadeIn 1s ease;
margin-bottom:20px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-30px);}
to{opacity:1;transform:translateY(0);}
}

h2{
text-align:center;
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.btn{
background:#28a745;
color:white;
width:100%;
}

.btn:hover{transform:scale(1.03);}

#dashboard{display:block;}

.top-box{
display:grid;
grid-template-columns:1fr 1fr auto;
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:15px;
overflow:hidden;
}

th{
background:#007bff;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

.soft-name{
cursor:pointer;
font-weight:bold;
transition:.4s;
}

.soft-name.active{
color:red;
transform:scale(1.1);
}

.download-btn{
background:#007bff;
color:white;
padding:8px 15px;
border-radius:8px;
transition:.4s;
}

.download-btn.active{
background:#ff5722;
transform:scale(1.1);
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginSection" class="card">
<h2>🔐 পাসওয়ার্ড দিয়ে লগইন করুন</h2>
<input type="password" id="password" placeholder="পাসওয়ার্ড লিখুন">
<button class="btn" onclick="login()">Login</button>
<p id="error" style="color:#ffcccc;text-align:center;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card">
<h2>📥 Software Download Dashboard</h2>

<div class="top-box">
<input type="text" id="softwareName" placeholder="Software Name">
<input type="text" id="softwareLink" placeholder="Google Drive Link">
<button onclick="addSoftware()" style="background:#28a745;color:white;">Add</button>
</div>

<table>
<thead>
<tr>
<th>ক্রমিক</th>
<th>সফটওয়্যার নাম</th>
<th>ডাউনলোড</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

</div>

</div>

<script>

const LOGIN_PASSWORD = "5101";
const DOWNLOAD_PASSWORD = "5102";

function login(){
let pass = document.getElementById("password").value;

if(pass === LOGIN_PASSWORD){
document.getElementById("loginSection").style.display="none";
loadData();
}else{
document.getElementById("error").innerText="❌ Wrong Password";
}
}

function getData(){
return JSON.parse(localStorage.getItem("softwareList")) || [];
}

function saveData(data){
localStorage.setItem("softwareList",JSON.stringify(data));
}

function renderTable(){

let data = getData();
let tbody = document.getElementById("tbody");
tbody.innerHTML="";

data.forEach((item,index)=>{

let row = document.createElement("tr");

row.innerHTML = `
<td></td>
<td><span class="soft-name">${item.name}</span></td>
<td><button class="download-btn">Download</button></td>
`;

tbody.appendChild(row);

// name click effect
row.querySelector(".soft-name").onclick = function(){
this.classList.toggle("active");
};

// download with password
row.querySelector(".download-btn").onclick = function(){

let pass = prompt("ডাউনলোড পাসওয়ার্ড দিন");

if(pass === DOWNLOAD_PASSWORD){
this.classList.add("active");

setTimeout(()=>{
this.classList.remove("active");
},1000);

window.open(item.link,"_blank");

}else{
alert("সঠিক পাসওয়ার্ড দিন");
}

};

});

updateSerials();
}

function updateSerials(){
document.querySelectorAll("#tbody tr").forEach((row,i)=>{
row.cells[0].innerText = i+1;
});
}

function addSoftware(){

let name = document.getElementById("softwareName").value.trim();
let link = document.getElementById("softwareLink").value.trim();

if(name==="" || link===""){
alert("সব তথ্য দিন");
return;
}

let data = getData();

// same link 3 times add
for(let i=1;i<=3;i++){
data.push({
name: name + " ("+i+")",
link: link
});
}

saveData(data);

document.getElementById("softwareName").value="";
document.getElementById("softwareLink").value="";

renderTable();
}

function loadData(){

let data = getData();

if(data.length === 0){
for(let i=1;i<=3;i++){
data.push({
name:"Sample Software ("+i+")",
link:"https://drive.google.com/uc?export=download&id=1rZ9V1YUrNqCkpECt_tPCjZyg997slHvw"
});
}
saveData(data);
}

renderTable();
}

</script>

</body>
</html>
