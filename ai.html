<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Mobile Screens Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.top{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.counter{
    text-align:center;
    margin:15px 0;
    font-size:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.phone{
    background:#1d1d1d;
    border:4px solid #444;
    border-radius:25px;
    padding:8px;
    height:340px;
    overflow:hidden;
}

.notch{
    width:70px;
    height:12px;
    background:#333;
    border-radius:20px;
    margin:0 auto 8px;
}

iframe{
    width:100%;
    height:290px;
    border:none;
    border-radius:15px;
}
</style>
</head>
<body>

<h1>20 Mobile Screens Demo</h1>

<div class="top">
    <input
        type="text"
        id="youtubeLink"
        placeholder="Paste YouTube Link Here"
        onkeydown="if(event.key==='Enter') loadVideo();"
    >
    <br>
    <button onclick="loadVideo()">Load Video</button>
</div>

<div class="counter">
    Active Screens: <span id="activeCount">0</span>/20
</div>

<div class="grid" id="phones"></div>

<script>
function getVideoId(url){
    const regExp =
    /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#&?]*).*/;

    const match = url.match(regExp);

    return (match && match[7].length === 11)
        ? match[7]
        : null;
}

function loadVideo(){

    const url = document.getElementById("youtubeLink").value.trim();
    const videoId = getVideoId(url);

    if(!videoId){
        alert("Please enter a valid YouTube URL");
        return;
    }

    const phones = document.getElementById("phones");
    phones.innerHTML = "";

    for(let i = 1; i <= 20; i++){

        const phone = document.createElement("div");
        phone.className = "phone";

        phone.innerHTML = `
            <div class="notch"></div>
            <iframe
                src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playsinline=1"
                allow="autoplay"
                allowfullscreen>
            </iframe>
        `;

        phones.appendChild(phone);
    }

    document.getElementById("activeCount").textContent = 20;
}
</script>

</body>
</html>
