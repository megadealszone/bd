<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Mobile Screens</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.top{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:8px 5px;
    font-size:16px;
    font-weight:bold;
}

.load-btn{
    background:#ff0000;
    color:#fff;
}

.toggle-btn{
    background:#00c853;
    color:#fff;
}

.counter{
    text-align:center;
    margin:20px 0;
    font-size:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.phone{
    background:#1d1d1d;
    border:4px solid #444;
    border-radius:25px;
    padding:8px;
}

.notch{
    width:70px;
    height:12px;
    background:#333;
    border-radius:20px;
    margin:0 auto 10px;
}

.player{
    width:100%;
    aspect-ratio:9/16;
    overflow:hidden;
    border-radius:15px;
}
</style>
</head>
<body>

<h1>20 Mobile Screens Demo</h1>

<div class="top">

    <input
        type="text"
        id="youtubeLink"
        placeholder="Paste YouTube URL Here"
        onkeydown="if(event.key==='Enter') loadVideo();">

    <br>

    <button class="load-btn" onclick="loadVideo()">
        Load Video
    </button>

    <button
        id="toggleBtn"
        class="toggle-btn"
        onclick="toggleAllVideos()">
        ▶ Play All
    </button>

</div>

<div class="counter">
    Active Screens:
    <span id="activeCount">0</span>/20
</div>

<div class="grid" id="phones"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let players = [];
let isPlaying = false;

function getVideoId(url){

    const regExp =
    /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#&?]*).*/;

    const match = url.match(regExp);

    return (match && match[7].length === 11)
        ? match[7]
        : null;
}

function loadVideo(){

    const url =
        document.getElementById("youtubeLink").value.trim();

    const videoId = getVideoId(url);

    if(!videoId){

        alert("Please enter a valid YouTube URL");
        return;
    }

    players = [];

    const phones =
        document.getElementById("phones");

    phones.innerHTML = "";

    for(let i=0;i<20;i++){

        const phone =
            document.createElement("div");

        phone.className = "phone";

        phone.innerHTML = `
            <div class="notch"></div>
            <div id="player${i}" class="player"></div>
        `;

        phones.appendChild(phone);
    }

    setTimeout(()=>{

        for(let i=0;i<20;i++){

            const player = new YT.Player(`player${i}`,{

                videoId: videoId,

                playerVars:{
                    playsinline:1,
                    rel:0,
                    modestbranding:1
                }

            });

            players.push(player);
        }

    },500);

    document.getElementById(
        "activeCount"
    ).textContent = "20";

    isPlaying = false;

    document.getElementById(
        "toggleBtn"
    ).innerHTML = "▶ Play All";

    document.getElementById(
        "toggleBtn"
    ).style.background = "#00c853";
}

function toggleAllVideos(){

    if(players.length === 0){

        alert("Load a video first");
        return;
    }

    const btn =
        document.getElementById("toggleBtn");

    if(!isPlaying){

        players.forEach(player=>{

            try{
                player.playVideo();
            }catch(e){}
        });

        btn.innerHTML = "⏹ Stop All";
        btn.style.background = "#f44336";

        isPlaying = true;

    }else{

        players.forEach(player=>{

            try{
                player.pauseVideo();
            }catch(e){}
        });

        btn.innerHTML = "▶ Play All";
        btn.style.background = "#00c853";

        isPlaying = false;
    }
}

</script>

</body>
</html>
