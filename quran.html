<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Legal Size Card Showcase</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --primary-dark: #111827; 
            --accent-gold: #c5a880;  
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --border-color: rgba(197, 168, 128, 0.2);
        }
        
        body {
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
            color: #f3f4f6;
        }

        /* 📄 প্রিমিয়াম লিগ্যাল সাইজ কার্ড কন্টেইনার (8.5" x 14" রেশিও অনুযায়ী পিক্সেল সেট করা হয়েছে) */
        .premium-legal-card {
            background-color: var(--primary-dark);
            width: 100%;
            max-width: 994px; /* স্ট্যান্ডার্ড চওড়া */
            height: 1308px; /* লিগ্যাল সাইজের লম্বা অনুপাত (১:১.৬৪) */
            box-shadow: var(--card-shadow);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* ভেতরের লাক্সারি বর্ডার ওভারলে */
        .premium-legal-card::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid rgba(197, 168, 128, 0.15);
            border-radius: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .card-header {
            padding: 40px 40px 25px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .card-header .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-weight: 600;
            background: rgba(197, 168, 128, 0.05);
        }
        .card-header h1 {
            font-size: 28px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .card-header .divider {
            width: 60px;
            height: 2px;
            background: var(--accent-gold);
            margin: 15px auto;
        }
        .card-header p {
            font-size: 14px;
            color: #9ca3af;
            font-weight: 300;
        }

        /* পিডিএফ কন্টেইনার */
        .pdf-frame-container {
            flex: 1;
            margin: 0 40px 40px 40px; 
            background-color: #030712;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            position: relative;
            z-index: 5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🛡️ ডান কোণার পপ-আউট বাটনটি ঢেকে রাখার ব্লক */
        .pdf-shield {
            position: absolute;
            top: 0;
            right: 0;
            width: 70px;       
            height: 70px;      
            background-color: #1f2937; /* আপনার ইমেজ অনুযায়ী গ্রে ব্লেন্ড কালার */
            z-index: 999;      
            border-bottom-left-radius: 8px;
        }

        /* মোবাইল স্ক্রিনের রেসপনসিভনেস (লিগ্যাল রেশিও ১:১.৬৪ ঠিক রাখা হয়েছে) */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .premium-legal-card { height: auto; aspect-ratio: 1 / 1.647; border-radius: 12px; }
            .premium-legal-card::before { top: 8px; left: 8px; right: 8px; bottom: 8px; }
            .card-header { padding: 25px 20px 15px 20px; }
            .card-header h1 { font-size: 20px; }
            .pdf-frame-container { margin: 0 20px 25px 20px; }
            .pdf-shield { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="premium-legal-card">
        <div class="card-header">
            <span class="badge">Legal Document View</span>
            <h1>কোরআন মাজিদ – ১-৩০ পারা – বড় হরফ</h1>
            <div class="divider"></div>
            <p>নিচে লিগ্যাল সাইজ ডকুমেন্টটি স্ক্রল করে সম্পূর্ণ দেখতে পারবেন</p>
        </div>

        <div class="pdf-frame-container">
            <div class="pdf-shield"></div>

            <iframe src="https://drive.google.com/file/d/1RRpM1W5MTWGcacSwvmJHIW1LSRbo37ak/preview?rm=minimal" allow="autoplay"></iframe>
        </div>
    </div>

</body>
</html>
