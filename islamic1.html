<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৩০টি ছোট সুরা কার্ড (বিস্তারিত দেখুন অপশনসহ)</title>
    <!-- Google Fonts থেকে কুরআনিক আরবি এবং বাংলা ফন্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f6f8fb 0%, #e9edf4 100%);
            font-family: 'Noto Serif Bengali', serif;
            color: #2d3748;
            padding: 50px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: #0f342e;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: clamp(0.95rem, 2vw, 1.15rem);
        }

        /* ফিল্টার বাটন সেকশন */
        .filter-container {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: #0f342e;
            background: #f1f5f9;
        }

        .filter-btn.active {
            background: #0f342e;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(15, 52, 46, 0.2);
        }

        /* রেসপন্সিভ গ্রিড কন্টেইনার */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 400px));
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            justify-content: center;
        }

        /* কার্ড ডিজাইন */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), 0 20px 48px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card.hide {
            display: none !important;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(15, 52, 46, 0.1);
        }

        /* থিম ১ (সবুজ) */
        .card.theme-green::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #10b981, #059669);
        }
        .card.theme-green .pronunciation strong { color: #059669; }

        /* থিম ২ (গোল্ডেন) */
        .card.theme-gold::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #f5af19, #e65c00);
        }
        .card.theme-gold .pronunciation strong { color: #e65c00; }

        .card-number {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
            background: #f1f5f9;
            padding: 3px 10px;
            border-radius: 50px;
        }

        /* আরবি ফন্ট ও লাইন ব্রেকিং ফিক্স */
        .arabic-title {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            color: #0f342e;
            margin-top: 20px;
            direction: rtl;
            font-weight: 700;
            line-height: 2.2; /* দুই লাইনের মাঝে পর্যাপ্ত গ্যাপের জন্য */
            word-break: keep-all; /* শব্দ বা হরকত যেন ভেঙে না যায় */
            width: 100%;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d97706, transparent);
            margin: 15px 0;
        }

        .pronunciation {
            font-size: 1.05rem;
            color: #1e293b;
            font-weight: 600;
            background: #f8fafc;
            padding: 12px 15px;
            border-radius: 14px;
            width: 100%;
            border: 1px solid #edf2f7;
            line-height: 1.5;
        }

        /* সি মোর বাটন ডিজাইন */
        .see-more-btn {
            background: #f1f5f9;
            border: none;
            color: #475569;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Noto Serif Bengali', serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
        }

        .see-more-btn:hover {
            background: #0f342e;
            color: #fff;
        }

        /* হিডেন কন্টেন্ট এরিয়া (See More অংশ) */
        .more-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            width: 100%;
        }

        .more-content.show {
            max-height: 1000px; /* কন্টেন্ট অনুযায়ী বড় হবে */
            transition: max-height 0.4s cubic-bezier(1, 0, 1, 0);
        }

        .surah-name {
            font-size: 1.1rem;
            color: #0f342e;
            font-weight: 700;
            margin-top: 15px;
            background: #e6f4f1;
            padding: 5px 15px;
            border-radius: 8px;
            display: inline-block;
        }

        .meaning {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
            margin-top: 12px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 10px;
            text-align: justify;
        }

        @media (max-width: 360px) {
            .card-container { grid-template-columns: 1fr; }
            .card { padding: 25px 15px; }
            .filter-container { padding: 6px; gap: 6px; }
            .filter-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <h1>পবিত্র কুরআনের ৩০টি ছোট সূরা</h1>
    <p class="subtitle">আরবি ও বাংলা উচ্চারণসহ দৃশ্যমান কার্ড (বিস্তারিত দেখতে 'বিস্তারিত দেখুন' বাটনে চাপুন)</p>

    <!-- ফিল্টার বাটনসমূহ -->
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterCards('all', this)">সবগুলো</button>
        <button class="filter-btn" onclick="filterCards('short', this)">ছোট সূরা (১-৫ আয়াত)</button>
        <button class="filter-btn" onclick="filterCards('medium', this)">মাঝারি সূরা (৬+ আয়াত)</button>
    </div>

    <!-- কার্ড কন্টেইনার -->
    <div class="card-container" id="cardContainer"></div>

    <script>
        // ৩০টি সূরার ডেটা অ্যারে
        const quranSurahs = [
            { name: "সূরা আল-ফাতিহা", ar: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴿١﴾ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ ﴿٢﴾ الرَّحْمَٰنِ الرَّحِيمِ ﴿٣﴾ مَالِكِ يَوْمِ الدِّينِ ﴿٤﴾ إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ﴿٥﴾ اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ ﴿٦﴾ صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ ﴿٧﴾", bn: "১. বিসমিল্লাহির রাহমানির রাহিম। ২. আলহামদু লিল্লাহি রব্বিল আলামিন। ৩. আর-রাহমানির রাহিম। ৪. মালিকি ইয়াওমিদ্দিন। ৫. ইয়্যাকা নাবুদু ওয়া ইয়্যাকা নাস্তাইন। ৬. ইহদিনাস সিরাতাল মুস্তাকিম। ৭. সিরাতাল্লাজিনা আনআমতা আলাইহিম গইরিাল মাগদুবি আলাইহিম ওয়ালাদ্দাল্লিন।", me: "১. পরম করুণাময় অসীম দয়ালু আল্লাহর নামে। ২. সব প্রশংসা আল্লাহর জন্য, যিনি জগৎসমূহের প্রতিপালক। ৩. যিনি পরম করুণাময় ও অসীম দয়ালু। ৪. যিনি বিচার দিবসের মালিক। ৫. আমরা কেবল তোমারই ইবাদত করি এবং কেবল তোমারই সাহায্য চাই। ৬. আমাদের সরল পথ দেখাও। ৭. তাদের পথ, যাদের তুমি নিয়ামত দিয়েছ; তাদের পথ নয় যারা ক্রোধগ্রস্ত ও পথভ্রষ্ট।", type: "medium" },
            { name: "সূরা আন-নাস", ar: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ ﴿١﴾ مَلِكِ النَّاسِ ﴿٢﴾ إِلَٰهِ النَّاسِ ﴿٣﴾ مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ﴿٤﴾ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ﴿٥﴾ مِنَ الْجِنَّةِ وَالنَّاسِ ﴿٦﴾", bn: "১. কুল আউজু বিরাব্বিন নাস। ২. মালিকিন নাস। ৩. ইলাহিন নাস। ৪. মিন শাররিল ওয়াসওয়াসিল খান্নাস। ৫. আল্লাজি ইউওয়াসউইসু ফি সুদুরিন নাস। ৬. মিনাল জিন্নাতি ওয়ান নাস।", me: "১. বলুন, আমি আশ্রয় প্রার্থনা করছি মানুষের প্রতিপালকের, ২. মানুষের রাজার, ৩. মানুষের ইলাহের (উপাস্যের), ৪. আত্মগোপনকারী কুচক্রীর অনিষ্ট থেকে, ۵. যে মানুষের অন্তরে কুমন্ত্রণা দেয়, ৬. জিন ও মানুষের মধ্য থেকে।", type: "medium" },
            { name: "সূরা আল-ফালাক", ar: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ﴿١﴾ مِنْ شَرِّ مَا خَلَقَ ﴿٢﴾ وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبُ ﴿٣﴾ وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ﴿٤﴾ وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ ﴿٥﴾", bn: "১. কুল আউজু বিরাব্বিল ফালাক। ২. মিন শাররি মা খালাক। ৩. ওয়া মিন শাররি গাসিকিন ইজা ওয়াকাব। ৪. ওয়া মিন শাররিন নাফফাসাতি ফিল উকাদ। ۵. ওয়া মিন শাররি হাসিদিন ইজা হাসাদ।", me: "১. বলুন, আমি আশ্রয় নিচ্ছি ঊষার প্রভুর, ২. তিনি যা সৃষ্টি করেছেন তার অনিষ্ট থেকে, ৩. অন্ধকার রাতের অনিষ্ট থেকে যখন তা সমাগত হয়, ৪. গ্রন্থিতে ফুঁৎকারদানকারী নারীদের অনিষ্ট থেকে, ৫. এবং হিংসুকের অনিষ্ট থেকে যখন সে হিংসা করে।", type: "short" },
            { name: "সূরা আল-ইখলাস", ar: "قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ ﴿٤﴾", bn: "১. কুল হুওয়াল্লাহু আহাদ। ২. আল্লাহুচ্ছামাদ। ৩. লাম ইয়ালিদ ওয়া লাম ইউলাদ। ৪. ওয়া লাম ইয়াকুল্লাহু কুফুয়ান আহাদ।", me: "১. বলুন, তিনিই আল্লাহ, একক। ২. আল্লাহ কারো মুখাপেক্ষী নন, সবাই তাঁর মুখাপেক্ষী। ৩. তিনি কাউকে জন্ম দেননি এবং তাঁকেও জন্ম দেওয়া হয়নি। ৪. আর তাঁর সমকক্ষ কেউ নেই।", type: "short" },
            { name: "সূরা আল-লাহাব", ar: "تَبَّتْ يَدَا أَبِي لَهَبٍ وَتَبَّ ﴿١﴾ مَا أَغْنَىٰ عَنْهُ مَالُهُ وَمَا كَسَبَ ﴿٢﴾ سَيَصْلَىٰ نَارًا ذَاتَ لَهَبٍ ﴿٣﴾ وَامْرَأَتُهُ حَمَّالَةَ الْحَطَبِ ﴿٤﴾ فِي جِيدِهَا حَبْلٌ مِنْ مَسَدٍ ﴿٥﴾", bn: "১. তাব্বাত ইয়াদা আবি লাহাবিন ওয়া তাব্ব। ২. মা আগনা আনহু মালুহু ওয়া মা কাসাব। ৩. সাইয়াছলা নারান জাতা লাহাব। ৪. ওয়ামরাআতুহু হাম্মা লাতাল হাত্বাব। ৫. ফী জীদিহা হাবলুম মিম মাসাদ।", me: "১. আবু লাহাবের হাত ধ্বংস হোক এবং সে নিজেও ধ্বংস হয়েছে। ২. তার ধন-সম্পদ ও যা সে উপার্জন করেছে তা তার কোনো কাজে আসেনি। ৩. সে অচিরেই লেলিহান আগুনে প্রবেশ করবে, ৪. এবং তার স্ত্রীও, যে লাকড়ি বহনকারী, ৫. তার গলায় থাকবে পাকানো রশি।", type: "short" },
            { name: "সূরা আন-নাসর", ar: "إِذَا جَاءَ نَصْرُ اللَّهِ وَالْفَتْحُ ﴿١﴾ وَرَأَيْتَ النَّاسَ يَدْخُلُونَ فِي دِينِ اللَّهِ أَفْوَاجًا ﴿٢﴾ فَسَبِّحْ بِحَمْدِ رَبِّكَ وَاسْتَغْفِرْهُ ۚ إِنَّهُ كَانَ تَوَّابًا ﴿٣﴾", bn: "১. ইজা জা-আ নাসরুল্লাহি ওয়াল ফাতহ। ২. ওয়া রাআইতান নাসা ইয়াদখুলুনা ফী দিনিল্লাহি আফওয়াজা। ৩. ফাসাব্বিহ বিহামদি রাব্বিকা ওয়াস্তাগফিরহু, ইন্নাহু কানা তাওয়াবা।", me: "১. যখন আল্লাহর সাহায্য ও বিজয় আসবে, ২. এবং আপনি মানুষকে দলে দলে আল্লাহর দ্বীনে প্রবেশ করতে দেখবেন, ৩. তখন আপনি আপনার প্রতিপালকের প্রশংসাসহ পবিত্রতা ঘোষণা করুন এবং তাঁর কাছে ক্ষমা প্রার্থনা করুন; নিশ্চয়ই তিনি তাওবা কবুলকারী।", type: "short" },
            { name: "সূরা আল-কাফিরুন", ar: "قُلْ يَا أَيُّهَا الْكَافِرُونَ ﴿١﴾ لَا أَعْبُدُ مَا تَعْبُدُونَ ﴿٢﴾ وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ ﴿٣﴾ وَلَا أَنَا عَابِدٌ مَا عَبَدْتُمْ ﴿٤﴾ وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ ﴿٥﴾ لَكُمْ دِينُكُمْ وَلِيَدِينِ ﴿٦﴾", bn: "১. কুল ইয়া আইয়ুহাল কাফিরুন। ২. লা আবুডু মা তাবুদুন। ৩. ওয়া লা আনতুম আবিদুনা মা আবুড। ৪. ওয়া লা আনা আবিদুম মা আবাদতুম। ৫. ওয়া লা আনতুম আবিদুনা মা আবুড। ৬. লাকুম দিনুকুম ওয়ালিয়া দিন।", me: "১. বলুন, হে কাফিরেরা! ২. আমি তার ইবাদত করি না যার ইবাদত তোমরা কর। ৩. এবং তোমরাও তার ইবাদতকারী নও যার ইবাদত আমি করি। ৪. আর আমি ইবাদতকারী নই তার যার ইবাদত তোমরা করেছ। ৫. এবং তোমরা তার ইবাদতকারী নও যার ইবাদত আমি করি। ৬. তোমাদের জন্য তোমাদের দ্বীন এবং আমার জন্য আমার দ্বীন।", type: "medium" },
            { name: "সূরা আল-কাওসার", ar: "إِنَّا أَعْطَيْنَاكَ الْكَوْثَرَ ﴿١﴾ فَصَلِّ لِرَبِّكَ وَانْحَرْ ﴿٢﴾ إِنَّ شَانِئَكَ هُوَ الْأَبْتَرُ ﴿٣﴾", bn: "১. ইন্না আতাইনাকাল কাওসার। ২. ফাসাল্লি লিরাব্বিকা ওয়ানহার। ৩. ইন্না শানিআকা হুওয়াল আবতার।", me: "১. নিশ্চয়ই আমি আপনাকে কাওসার (প্রচুর কল্যাণ) দান করেছি। ২. অতএব আপনার প্রতিপালকের উদ্দেশ্যে সালাত আদায় করুন এবং কোরবানি করুন। ৩. নিশ্চয়ই আপনার প্রতি বিদ্বেষপোষণকারীই তো নির্বংশ।", type: "short" },
            { name: "সূরা আল-মাউন", ar: "أَرَأَيْتَ الَّذِي يُكَذِّبُ بِالدِّينِ ﴿١﴾ فَذَٰلِكَ الَّذِي يَدُعُّ الْيَتِيمَ ﴿٢﴾ وَلَا يَحُضُّ عَلَىٰ طَعَامِ الْمِسْكِينِ ﴿٣﴾ فَوَيْلٌ لِلْمُصَلِّينَ ﴿٤﴾ الَّذِينَ هُمْ عَنْ صَلَاتِهِمْ سَاهُونَ ﴿٥﴾ الَّذِينَ هُمْ يُرَاءُونَ ﴿٦﴾ وَيَمْنَعُونَ الْمَاعُونَ ﴿٧﴾", bn: "১. আরাআইতাল্লাজি ইউকাজ্জিবু বিদ্দিন। ২. ফাজালিকাল্লাজি ইয়াদুউল ইয়াতিম। ৩. ওয়া লা ইয়াহুদ্দু আলা ত্বাআমিল মিসকিন। ৪. ফাওয়াইলুল লিলমুসাল্লিন। ৫. আল্লাজিনা হুম আন সালাতিহিম সাহুন। ৬. আল্লাজিনা হুম ইউরাউন। ৭. ওয়া ইয়ামনাউনাল মাউন।", me: "১. আপনি কি দেখেছেন তাকে, যে শেষ বিচারকে অস্বীকার করে? ২. সে তো সেই, যে এতিমকে তাড়িয়ে দেয়, ৩. এবং মিসকিনকে অন্নদানে উৎসাহিত করে না। ৪. অতএব দুর্ভোগ সেই সালাত আদায়কারীদের জন্য, ৫. যারা তাদের সালাত সম্বন্ধে উদাসীন; ৬. যারা লোক দেখানোর জন্য তা করে, ৭. এবং নিত্যব্যবহার্য ছোটখাটো সাহায্য দানে বিরত থাকে।", type: "medium" },
            { name: "সূরা কুরাইশ", ar: "لِإِيلَافِ قُرَيْشٍ ﴿١﴾ إِيلَافِهِمْ رِحْلَةَ الشِّتَاءِ وَالصَّيْفِ ﴿٢﴾ فَلْيَعْبُدُوا رَبَّ هَٰذَا الْبَيْتِ ﴿٣﴾ الَّذِي أَطْعَمَهُمْ مِنْ جُوعٍ وَآمَنَهُمْ مِنْ خَوْفٍ ﴿٤﴾", bn: "১. লিঈলাফি কুরাইশ। ২. ইলাফিহিম রিহলাতাশ শিতাই ওয়াচ্ছাইফ। ৩. ফালইয়াবুদু রাব্বা হাজাল বাইত। ৪. আল্লাজি আতআমাহুম মিন জুইও ওয়া আমানাহুম মিন খওফ।", me: "১. কুরাইশদের আসক্তির কারণে, ২. আসক্তির কারণে তাদের শীত ও গ্রীষ্মকালীন সফরের। ৩. অতএব তারা ইবাদত করুক এই গৃহের (কাবার) প্রতিপালকের, ৪. যিনি তাদেরকে ক্ষুধা থেকে অন্ন দিয়েছেন এবং ভয়ভীতি থেকে নিরাপদ করেছেন।", type: "short" },
            { name: "সূরা আল-ফিল", ar: "أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَابِ الْفِيلِ ﴿١﴾ أَلَمْ يَجْعَلْ كَيْدَهُمْ فِي تَضْلِيلٍ ﴿٢﴾ وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ ﴿٣﴾ تَرْمِيهِمْ بِحِجَارَةٍ مِنْ سِجِّيلٍ ﴿٤﴾ فَجَعَلَهُمْ كَعَصْفٍ مَأْكُولٍ ﴿٥﴾", bn: "১. আলাম তারা কাইফা ফায়ালা রাব্বুকা বিআসহাবিল ফিল। ২. আলাম ইয়াজআল কাইদাহুম ফী তাদলীল। ৩. ওয়া আরসালা আলাইহিম তায়রান আবাবীল। ৪. তারমীহিম বিহিজারাতিম মিন সিজ্জীল। ৫. ফাজাআলাহুম কাআছফিম মাকুল।", me: "১. আপনি কি দেখেননি আপনার প্রতিপালক হস্তীবাহিনীর প্রতি কী করেছিলেন? ২. তিনি কি তাদের চক্রান্ত নস্যাৎ করে দেননি? ৩. এবং তিনি তাদের ওপর ঝাঁকে ঝাঁকে পাখি পাঠিয়েছিলেন, ৪. যারা তাদের ওপর পোড়ামাটির পাথর নিক্ষেপ করেছিল। ৫. অতঃপর তিনি তাদেরকে চর্বিত ঘাসের মতো করে দেন।", type: "short" },
            { name: "সূরা আল-হুমাজাহ", ar: "وَيْلٌ لِكُلِّ هُمَزَةٍ لُمَزَةٍ ﴿١﴾ الَّذِي جَمَعَ مَالًا وَعَدَّدَهُ ﴿٢﴾ يَحْسَبُ أَنَّ مَالَهُ أَخْلَدَهُ ﴿٣﴾ كَلَّا ۖ لَيُنْبَذَنَّ فِي الْحُطَمَةِ ﴿٤﴾ وَمَا أَدْرَاكَ مَا الْحُطَمَةُ ﴿٥﴾ نَارُ اللَّهِ الْمُوقَدَةُ ﴿٦﴾ الَّتِي تَطَّلِعُ عَلَى الْأَفْئِدَةِ ﴿٧﴾ إِنَّهَا عَلَيْهِمْ مُؤْصَدَةٌ ﴿٨﴾ فِي عَمَدٍ مُمَدَّدَةٍ ﴿٩﴾", bn: "১. ওয়াইলুল লিকুল্লি হুমাজাতিল লুমাজাহ। ২. আল্লাজি জামাআ মালও ওয়া আদ্দাদাহ। ৩. ইয়াহসাবু আন্না ফী মালুহু আখলাদাহ। ৪. কাল্লা লাইউমবাজান্না ফিল হুতামাহ। ৫. ওয়া মা আদরাকা মাল হুতামাহ। ৬. নারুল্লাহিল মুকাদাহ। ৭. আল্লাতি তাত্তালিউ আলাল আফইদাহ। ৮. ইন্নাহা আলাইহিম মুছাদাহ। ৯. ফী আমাদিম মুমাদ্দাদাহ।", me: "১. ধ্বংস প্রত্যেকের যে সামনে ও পেছনে লোকের নিন্দা করে, ২. যে সম্পদ জমা করে ও তা গণনা করে রাখে। ৩. সে মনে করে যে, তার সম্পদ তাকে অমর করে রাখবে। ৪. কখনোই নয়! সে অবশ্যই নিক্ষিপ্ত হবে 'হুতামাহ'-এ। ৫. আর কিসে আপনাকে জানাবে হুতামাহ কী? ৬. এটা আল্লাহর প্রজ্বলিত আগুন, ৭. যা হৃদয় পর্যন্ত গ্রাস করবে। ৮. নিশ্চয়ই তা তাদেরকে পরিবেষ্টন করে রাখবে, ৯. দীর্ঘায়িত স্তম্ভসমূহে।", type: "medium" },
            { name: "সূরা আল-আসর", ar: "وَالْعَصْرِ ﴿١﴾ إِنَّ الْإِنْسَانَ لَفِي خُسْرٍ ﴿٢﴾ إِلَّا الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ وَتَوَاصَوْا بِالْحَقِّ وَتَوَاصَوْا بِالصَّبْرِ ﴿٣﴾", bn: "১. ওয়াল আছর। ২. ইননাল ইনসানা লাফী খুসর। ৩. ইল্লাল্লাজিনা আমানু ওয়া আমিলুচ্ছালিহাতি ওয়া তাওয়া ছও বিল হাক্কি ওয়া তাওয়া ছও বিচ্ছাবর।", me: "১. সময়ের কসম, ২. নিশ্চয়ই মানুষ ক্ষতির মধ্যে রয়েছে। ৩. তবে তারা ছাড়া যারা ঈমান এনেছে, সৎকাজ করেছে এবং একে অপরকে সত্যের উপদেশ দিয়েছে ও ধৈর্যের উপদেশ দিয়েছে।", type: "short" },

            { name: "সূরা আল-আলাক", ar: "اقْرَأْ بِاسْمِ رَبِّكَ الَّذِي خَلَقَ ﴿١﴾ خَلَقَ الْإِنْسَانَ مِنْ عَلَقٍ ﴿٢﴾ اقْرَأْ وَرَبُّكَ الْأَكْرَمُ ﴿٣﴾ الَّذِي عَلَّمَ بِالْقَلَمِ ﴿٤﴾ عَلَّمَ الْإِنْسَانَ مَا لَمْ يَعْلَمْ ﴿٥﴾", bn: "১. ইকরা বিসমি রাব্বিকাল্লাজি খালাক। ২. খালাকাল ইনসানা মিন আলাক। ৩. ইকরা ওয়া রাব্বুকাল আকরাম। ৪. আল্লাজি আল্লামা বিল কালাম। ৫. আল্লামাল ইনসানা মা লাম ইয়ালাম।", me: "১. পাঠ করুন আপনার প্রতিপালকের নামে যিনি সৃষ্টি করেছেন, ২. সৃষ্টি করেছেন মানুষকে জমাট রক্তবিন্দু থেকে। ৩. পাঠ করুন, আর আপনার প্রতিপালক পরম দয়ালু, ৪. যিনি কলমের সাহায্যে শিক্ষা দিয়েছেন, ৫. শিক্ষা দিয়েছেন মানুষকে যা সে জানত না।", type: "short" },
            { name: "সূরা আত-তিন", ar: "وَالتِّينِ وَالزَّيْتُونِ ﴿١﴾ وَطُورِ سِينِينَ ﴿٢﴾ وَهَٰذَا الْبَلَدِ الْأَمِينِ ﴿٣﴾ لَقَدْ خَلَقْنَا الْإِنْسَانَ فِي أَحْسَنِ تَقْوِيمٍ ﴿٤﴾", bn: "১. ওয়াত্তীনি ওয়ায যাইতুনি। ২. ওয়া তুরি সীনীনা। ৩. ওয়া হাজাল বালাদিল আমীনি। ৪. লাকাদ খালাকনাল ইনসানা ফী আহসানি তাকউইম।", me: "১. কসম ডুমুর ও জয়তুনের, ২. এবং সিনাই পর্বতের, ৩. এবং এই নিরাপদ নগরীর (মক্কার)। ৪. নিশ্চয়ই আমি মানুষকে সৃষ্টি করেছি সর্বোত্তম গঠনে।", type: "short" },

            { name: "সূরা আদ-দুহা", ar: "وَالضُّحَىٰ ﴿١﴾ وَاللَّيْلِ إِذَا سَجَىٰ ﴿٢﴾ مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ ﴿٣﴾ وَلَلْآخِرَةُ خَيْرٌ لَكَ مِنَ الْأُولَىٰ ﴿٤﴾", bn: "১. ওয়াদ্দুহা। ২. ওয়াল্লাইলি ইজা সাজা। ৩. মা ওয়াদ্দাআকা রাব্বুকা ওয়া মা কালা। ৪. ওয়ালাল আখিরাতু খাইরুল লাকা মিনাল উলা।", me: "১. কসম পূর্বাহ্নের রোদের, ২. কসম রাতের যখন তা নিঝুম হয়, ৩. আপনার প্রতিপালক আপনাকে পরিত্যাগ করেননি এবং অসন্তুষ্টও হননি। ৪. আর আপনার জন্য পরের পর্যায়টি আগেরটির চেয়ে অবশ্যই উত্তম।", type: "short" },
            { name: "সূরা আল-লাইল", ar: "وَاللَّيْلِ إِذَا يَغْشَىٰ ﴿١﴾ وَالنَّهَارِ إِذَا تَجَلَّىٰ ﴿٢﴾ وَمَا خَلَقَ الذَّكَرَ وَالْأُنْثَىٰ ﴿٣﴾ إِنَّ سَعْيَكُمْ لَشَتَّىٰ ﴿٤﴾", bn: "১. ওয়াল্লাইলি ইজা ইয়াগশা। ২. ওয়াননাহারী ইজা তাজাল্লা। ৩. ওয়া মা খালাকাজ জাকারা ওয়াল উনছা। ৪. ইন্না সাইয়্যাকুম লাশাত্তা।", me: "১. কসম রাতের যখন তা আচ্ছাদিত করে, ২. কসম দিনের যখন তা উদ্ভাসিত হয়, ৩. কসম তাঁর যিনি নর ও নারী সৃষ্টি করেছেন, ৪. নিশ্চয়ই তোমাদের প্রচেষ্টা বিভিন্ন প্রকারের।", type: "short" },
            { name: "সূরা আশ-শামস", ar: "وَالشَّمْسِ وَضُحَاهَا ﴿١﴾ وَالْقَمَرِ إِذَا تَلَاهَا ﴿٢﴾ وَالنَّهَارِ إِذَا جَلَّاهَا ﴿٣﴾ وَاللَّيْلِ إِذَا يَغْشَاهَا ﴿٤﴾", bn: "১. ওয়াশশামসি ওয়া দুহাহা। ২. ওয়াল কামারি ইজা তালাইহা। ৩. ওয়াননাহারী ইজা জাল্লাহা। ৪. ওয়াল্লাইলি ইজা ইয়াগশাহা।", me: "১. কসম সূর্যের ও তার কিরণের, ২. কসম চাঁদের যখন তা সূর্যের পিঠে আসে, ৩. কসম দিনের যখন তা সূর্যকে প্রখর করে, ৪. কসম রাতের যখন তা সূর্যকে আচ্ছাদিত করে।", type: "short" },

            { name: "সূরা আল-ফাজর", ar: "وَالْفَجْرِ ﴿١﴾ وَلَيَالٍ عَشْرٍ ﴿٢﴾ وَالشَّفْعِ وَالْوَتْرِ ﴿٣﴾ وَاللَّيْلِ إِذَا يَسْرِ ﴿٤﴾ هَلْ فِي ذَٰلِكَ قَسَمٌ لِذِي حِجْرٍ ﴿٥﴾", bn: "১. ওয়াল ফাজর। ২. ওয়া লাইয়ালিন আশর। ৩. ওয়াশশাফই ওয়াল ওয়াতর। ৪. ওয়াল্লাইলি ইজা ইয়াসর। ৫. হাল ফী জালিকা কাসামুল লিজি হিজর।", me: "১. কসম ভোরের, ২. কসম দশ রাতের, ৩. কসম জোড় ও বেজোড়ের, ৪. কসম রাতের যখন তা চলে যায়, ৫. এর মধ্যে কি বুদ্ধিমানের জন্য কোনো কসম আছে?", type: "short" },
            { name: "সূরা আল-গাশিয়াহ", ar: "هَلْ أَتَاكَ حَدِيثُ الْغَاشِيَةِ ﴿١﴾ وُجُوهٌ يَوْمَئِذٍ خَاشِعَةٌ ﴿٢﴾ عَامِلَةٌ نَاصِبَةٌ ﴿٣﴾ تَصْلَىٰ نَارًا حَامِيَةً ﴿٤﴾", bn: "১. হাল আতাকা হাদিসুল গাশিয়াহ। ২. ওজুহুয় ইয়াওমাই জিন খাশিআহ। ৩. আমিলাতুন নাছিবাহ। ৪. তাছলা নারান হামিয়াহ।", me: "১. আপনার কাছে কি আচ্ছন্নকারী কেয়ামতের বৃত্তা্ন্ত এসেছে? ২. সেদিন অনেক মুখমন্ডল হবে লাঞ্ছিত, ৩. কঠোর পরিশ্রান্ত, ৪. তারা প্রবেশ করবে জ্বলন্ত আগুনে।", type: "short" },

            { name: "সূরা আত-তারিক", ar: "وَالسَّمَاءِ وَالطَّارِقِ ﴿١﴾ وَمَا أَدْرَاكَ مَا الطَّارِقُ ﴿٢﴾ النَّجْمُ الثَّاقِبُ ﴿٣﴾ إِنْ كُلُّ نَفْسٍ لَمَّا عَلَيْهَا حَافِظٌ ﴿٤﴾", bn: "১. ওয়াসসামাই ওয়াত্তারিক। ২. ওয়া মা আদরাকা মাত্তারিক। ৩. আন্ন্যাজমুত ছাকিব। ৪. ইন কুল্লু নাফসিল লাম্মা আলাইহা হাফিজ।", me: "১. কসম আকাশের এবং রাতের আগন্তুকের। ২. আর কিসে আপনাকে জানাবে রাতের আগন্তুক কী? ৩. তা এক উজ্জ্বল নক্ষত্র। ৪. কোনো প্রাণ এমন নেই যার ওপর কোনো রক্ষক নেই।", type: "short" }

        // দুই সেট ডেটা একত্র করে ৩০টি সূরা তৈরি
        const totalSurahs = [...quranSurahs, ...restSurahs];

        const container = document.getElementById('cardContainer');

        function toBanglaNumber(n) {
            return String(n).replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[d]);
        }

        // কার্ড জেনারেট করার লুপ
        totalSurahs.forEach((surah, index) => {
            const cardNum = index + 1;
            const themeClass = cardNum % 2 === 0 ? 'theme-gold' : 'theme-green';
            const bnNumber = toBanglaNumber(cardNum);

            const cardHTML = `
                <div class="card ${themeClass}" data-category="${surah.type}">
                    <span class="card-number">${bnNumber}</span>
                    <div class="arabic-title">${surah.ar}</div>
                    <div class="divider"></div>
                    <p class="pronunciation"><strong>উচ্চারণ:</strong> ${surah.bn}</p>
                    
                    <!-- সি মোর অপশন এরিয়া -->
                    <button class="see-more-btn" onclick="toggleSeeMore(this)">বিস্তারিত দেখুন</button>
                    <div class="more-content">
                        <div class="surah-name">${surah.name}</div>
                        <p class="meaning"><strong>অর্থ:</strong> ${surah.me}</p>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });

        // সি মোর টগল ফাংশন
        function toggleSeeMore(button) {
            const content = button.nextElementSibling;
            content.classList.toggle('show');
            if (content.classList.contains('show')) {
                button.textContent = "সংক্ষিপ্ত করুন";
            } else {
                button.textContent = "বিস্তারিত দেখুন";
            }
        }

        // ফিল্টারিং ফাংশন
        function filterCards(category, button) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            document.querySelectorAll('.card').forEach(card => {
                if (category === 'all') {
                    card.classList.remove('hide');
                } else {
                    if (card.getAttribute('data-category') === category) {
                        card.classList.remove('hide');
                    } else {
                        card.classList.add('hide');
                    }
                }
            });
        }
    </script>
</body>
</html>
