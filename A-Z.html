<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A-Z Voice Learning</title>

<style>
body{
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

h1{
    background: #4CAF50;
    color: white;
    padding: 15px;
}

/* Grid */
.container{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 20px;
}

/* Big Child-Friendly Box */
.box{
    background: white;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 48px;   /* বড় অক্ষর */
    font-weight: bold;

    border-radius: 15px;
    cursor: pointer;

    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    transition: transform 0.2s, background 0.2s;
}

/* Click Animation */
.box.active{
    animation: pop 0.4s ease;
    background: #dff0d8;
}

@keyframes pop{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.3) rotate(5deg); }
    100%{ transform: scale(1); }
}
</style>
</head>

<body>

<h1>A-Z Alphabet Voice Learning</h1>

<div class="container" id="letters"></div>

<script>

const words = {
A:"Apple",
B:"Ball",
C:"Cat",
D:"Dog",
E:"Elephant",
F:"Fish",
G:"Goat",
H:"Hen",
I:"Ice cream",
J:"Jug",
K:"Kite",
L:"Lion",
M:"Monkey",
N:"Nest",
O:"Orange",
P:"Parrot",
Q:"Queen",
R:"Rose",
S:"Sun",
T:"Tiger",
U:"Umbrella",
V:"Violin",
W:"Watch",
X:"X-ray",
Y:"Yak",
Z:"Zebra"
};

const container = document.getElementById("letters");

for(let letter in words){
    let div = document.createElement("div");
    div.className = "box";
    div.innerHTML = letter;

    div.onclick = function(){

        // Animation add
        div.classList.add("active");

        setTimeout(()=>{
            div.classList.remove("active");
        },400);

        // Voice
        let text = letter + " for " + words[letter];
        let speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en-US";
        speech.rate = 0.9;

        speechSynthesis.speak(speech);
    }

    container.appendChild(div);
}

</script>

</body>
</html>
