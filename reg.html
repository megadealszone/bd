<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>রেজিস্টর ক্যালকুলেটর</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; }
        .radio-group { display: flex; justify-content: space-around; margin-top: 10px; }
        .result { margin-top: 25px; padding: 15px; background: #222; color: #0f0; text-align: center; font-size: 16px; border-radius: 8px; }
        .range { font-size: 14px; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>রেজিস্টর ক্যালকুলেটর</h2>
    
    <div class="radio-group">
        <label><input type="radio" name="bands" value="3" checked onchange="toggleBands()"> ৩-ব্যান্ড</label>
        <label><input type="radio" name="bands" value="4" onchange="toggleBands()"> ৪-ব্যান্ড</label>
    </div>
    
    <label>১ম ব্যান্ড:</label>
    <select id="b1" onchange="calc()"></select>
    
    <label>২য় ব্যান্ড:</label>
    <select id="b2" onchange="calc()"></select>
    
    <label>৩য় ব্যান্ড (গুণক):</label>
    <select id="b3" onchange="calc()"></select>

    <div id="band4Container" style="display:none;">
        <label>৪র্থ ব্যান্ড (টলারেন্স):</label>
        <select id="b4" onchange="calc()">
            <option value="5">সোনালী (±5%)</option>
            <option value="10">রুপালী (±10%)</option>
            <option value="20">কোনো রঙ নেই (±20%)</option>
        </select>
    </div>

    <div class="result" id="res">মান: 0 Ω</div>
</div>

<script>
    const colors = [
        {name: "কালো (কা)", val: 0}, {name: "বাদামী (বা)", val: 1}, 
        {name: "লাল (লা)", val: 2}, {name: "কমলা (ক)", val: 3}, 
        {name: "হলুদ (হ)", val: 4}, {name: "সবুজ (স)", val: 5}, 
        {name: "নীল (নী)", val: 6}, {name: "বেগুনি (বে)", val: 7}, 
        {name: "ধূসর (ধূ)", val: 8}, {name: "সাদা (সা)", val: 9}
    ];

    ['b1', 'b2', 'b3'].forEach(id => {
        let sel = document.getElementById(id);
        colors.forEach(c => {
            sel.innerHTML += `<option value="${c.val}">${c.name}</option>`;
        });
    });

    function toggleBands() {
        const is4Band = document.querySelector('input[name="bands"]:checked').value === "4";
        document.getElementById('band4Container').style.display = is4Band ? "block" : "none";
        calc();
    }

    function calc() {
        let v1 = parseInt(document.getElementById('b1').value);
        let v2 = parseInt(document.getElementById('b2').value);
        let v3 = parseInt(document.getElementById('b3').value);
        let is4Band = document.querySelector('input[name="bands"]:checked').value === "4";
        
        // যদি ৩-ব্যান্ড হয় তবে ডিফল্ট টলারেন্স ২০%
        let tol = is4Band ? parseInt(document.getElementById('b4').value) : 20;
        
        let resistance = (v1 * 10 + v2) * Math.pow(10, v3);
        let toleranceValue = resistance * (tol / 100);
        
        let minRange = resistance - toleranceValue;
        let maxRange = resistance + toleranceValue;
        
        document.getElementById('res').innerHTML = `মান: ${resistance.toLocaleString()} Ω ± ${tol}%` + 
            `<div class="range">${minRange.toLocaleString()} - ${maxRange.toLocaleString()} ohm</div>`;
    }
    
    calc();
</script>
</body>
</html>
