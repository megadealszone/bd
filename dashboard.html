<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

/* ================= BASIC ================= */
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.box{
    max-width:520px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

/* ================= INPUT ================= */
input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

/* ================= BIG BUTTON ================= */
button{
    padding:8px 12px;
    background:#0528f3;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
    transition:0.2s;
}

/* hover all buttons */
button:hover{
    transform:scale(1.05);
    background:#ffb300;
}

/* ================= SMALL BUTTONS ================= */
.small{
    padding:5px 8px;
    font-size:12px;
    margin:3px;
    border-radius:4px;
}

.edit{background:green;}
.delete{background:red;}
.update{background:orange;}

/* hover effect small */
.small:hover{
    opacity:0.8;
    transform:scale(1.05);
}

/* ================= RESULT BOX ================= */
.item{
    background:#f1f1f1;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

/* ================= UPDATE BUTTON HIDE ================= */
#updateBtn{
    display:none;
    background:orange;
    margin-top:10px;
}

/* ================= MESSAGE ================= */
.msg{
    text-align:center;
    margin:10px 0;
    font-weight:bold;
    color:#333;
}

</style>
</head>

<body>

<div class="box">

<h2>Dashboard</h2>

<div class="msg" id="msg"></div>

<!-- ================= ADD PRODUCT ================= -->
<input id="title" placeholder="Product Title">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Affiliate Link">

<button onclick="addProduct()">Submit</button>

<hr>

<!-- ================= SEARCH ================= -->
<input id="search" placeholder="Search Product Title">
<button onclick="searchProduct()">Search</button>

<div id="result"></div>

<!-- UPDATE BUTTON (ONLY SHOW AFTER EDIT) -->
<button id="updateBtn" onclick="updateProduct()">Update Product</button>

</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= MESSAGE ================= */
function msg(text,color="black"){
document.getElementById("msg").innerText = text;
document.getElementById("msg").style.color = color;

setTimeout(()=>{
document.getElementById("msg").innerText="";
},2000);
}

/* ================= ADD PRODUCT ================= */
window.addProduct = async function(){

let title = document.getElementById("title").value.trim();
let price = document.getElementById("price").value.trim();
let image = document.getElementById("image").value.trim();
let link  = document.getElementById("link").value.trim();

/* warning check */
if(!title || !price || !image){
msg("⚠️ Fill all required fields","red");
return;
}

/* affiliate link warning */
if(!link){
msg("⚠️ Affiliate Link Required","red");
return;
}

/* save */
await addDoc(collection(db,"products"),{
title,price,image,link,time:Date.now()
});

msg("✔ Product Saved Successfully","green");

/* clear */
document.getElementById("title").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
document.getElementById("link").value="";

}

/* ================= SEARCH ================= */
window.searchProduct = async function(){

let q = document.getElementById("search").value.trim().toLowerCase();

if(!q){
msg("⚠️ Search box is empty","red");
return;
}

let result = document.getElementById("result");
result.innerHTML="";

let snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{

let p = d.data();

if(p.title.toLowerCase().includes(q)){

result.innerHTML += `
<div class="item">

<b>${p.title}</b><br>
${p.price}<br>

<button class="small edit" onclick="editProduct('${d.id}','${p.title}','${p.price}','${p.image}','${p.link}')">Edit</button>

<button class="small delete" onclick="deleteProduct('${d.id}')">Delete</button>

</div>
`;

}

});

}

/* ================= DELETE ================= */
window.deleteProduct = async function(id){
await deleteDoc(doc(db,"products",id));
msg("Deleted ✔","red");
searchProduct();
}

/* ================= EDIT ================= */
window.editProduct = function(id,title,price,image,link){

document.getElementById("title").value = title;
document.getElementById("price").value = price;
document.getElementById("image").value = image;
document.getElementById("link").value = link;

/* show update button */
window.editId = id;
document.getElementById("updateBtn").style.display="block";

msg("Editing Mode ON","orange");

}

/* ================= UPDATE ================= */
window.updateProduct = async function(){

if(!window.editId){
msg("⚠️ No product selected","red");
return;
}

let title = document.getElementById("title").value.trim();
let price = document.getElementById("price").value.trim();
let image = document.getElementById("image").value.trim();
let link  = document.getElementById("link").value.trim();

/* validation */
if(!title || !price || !image || !link){
msg("⚠️ Fill all fields","red");
return;
}

/* update */
await updateDoc(doc(db,"products",window.editId),{
title,price,image,link
});

msg("✔ Updated Successfully","green");

/* hide update button */
document.getElementById("updateBtn").style.display="none";
window.editId=null;

searchProduct();

}

</script>

</body>
</html>
