<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.form-box{
    max-width:500px;
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#ffcc00;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* search result */
.result{
    margin-top:20px;
    background:#fff;
    padding:10px;
    border-radius:10px;
}

.item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.small-btn{
    padding:6px;
    margin-top:5px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.edit{
    background:#4caf50;
    color:white;
}

.delete{
    background:#f44336;
    color:white;
}

/* =========================
   MESSAGE BOX (TOAST)
========================= */
#msg{
    position:fixed;
    top:20px;
    right:20px;
    background:#333;
    color:#fff;
    padding:10px 15px;
    border-radius:5px;
    display:none;
    z-index:999;
}
</style>
</head>

<body>

<!-- MESSAGE BOX -->
<div id="msg"></div>

<div class="form-box">

<h2>Add Product</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="text" id="price" placeholder="Price">
<input type="text" id="image" placeholder="Image URL">
<input type="text" id="link" placeholder="Affiliate Link">

<button onclick="addProduct()">Submit</button>

<hr>

<h3>Search Product</h3>

<input type="text" id="search" placeholder="Search by Title">
<button onclick="searchProduct()">Search</button>

<div id="result" class="result"></div>

</div>

<script>

/* =========================
   SHOW MESSAGE FUNCTION
========================= */
function showMsg(text, color="#333"){
    let msg = document.getElementById("msg");
    msg.style.display = "block";
    msg.style.background = color;
    msg.innerText = text;

    setTimeout(()=>{
        msg.style.display = "none";
    }, 2000);
}

/* =========================
   ADD PRODUCT
========================= */
function addProduct(){

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;
let link = document.getElementById("link").value;

let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({ title, price, image, link });

localStorage.setItem("products", JSON.stringify(products));

showMsg("Product Added Successfully!", "#4caf50");
}

/* =========================
   SEARCH PRODUCT
========================= */
function searchProduct(){

let query = document.getElementById("search").value.toLowerCase();
let products = JSON.parse(localStorage.getItem("products")) || [];

let resultBox = document.getElementById("result");

resultBox.innerHTML = "";

products.forEach((p, index) => {

if(p.title.toLowerCase().includes(query)){

resultBox.innerHTML += `
<div class="item">
<b>${p.title}</b><br>
${p.price}<br>

<button class="small-btn edit" onclick="editProduct(${index})">Edit</button>
<button class="small-btn delete" onclick="deleteProduct(${index})">Delete</button>
</div>
`;

}

});

}

/* =========================
   EDIT PRODUCT
========================= */
function editProduct(index){

let products = JSON.parse(localStorage.getItem("products")) || [];

let p = products[index];

let newTitle = prompt("Edit Title", p.title);
let newPrice = prompt("Edit Price", p.price);
let newImage = prompt("Edit Image", p.image);
let newLink = prompt("Edit Link", p.link);

products[index] = {
    title: newTitle,
    price: newPrice,
    image: newImage,
    link: newLink
};

localStorage.setItem("products", JSON.stringify(products));

showMsg("Product Updated Successfully!", "#4caf50");

searchProduct();
}

/* =========================
   DELETE PRODUCT
========================= */
function deleteProduct(index){

let products = JSON.parse(localStorage.getItem("products")) || [];

products.splice(index, 1);

localStorage.setItem("products", JSON.stringify(products));

showMsg("Product Deleted Successfully!", "#f44336");

searchProduct();
}

</script>

</body>
</html>
