<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
}

button{
    width:100%;
    padding:12px;
    margin-top:5px;
    background:#0528f3;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.item{
    background:#eee;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
.small{
    padding:5px;
    margin:3px;
    font-size:12px;
}
.edit{background:green;}
.delete{background:red;}
.update{background:orange;}
</style>
</head>

<body>

<div class="box">

<h2>Add / Search Product</h2>

<!-- ADD PRODUCT -->
<input id="title" placeholder="Product Title">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Affiliate Link">

<button onclick="addProduct()">Add Product</button>

<hr>

<!-- SEARCH -->
<input id="search" placeholder="Search by Title">
<button onclick="searchProduct()">Search</button>

<div id="result"></div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ADD PRODUCT ================= */
window.addProduct = async function(){

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;
let link  = document.getElementById("link").value;

await addDoc(collection(db,"products"),{
    title,
    price,
    image,
    link,
    time: Date.now()
});

alert("Saved ✔");

}

/* ================= SEARCH ================= */
window.searchProduct = async function(){

let q = document.getElementById("search").value.toLowerCase();
let result = document.getElementById("result");

result.innerHTML = "";

let snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{

let p = d.data();

if(p.title.toLowerCase().includes(q)){

result.innerHTML += `
<div class="item">

<b>${p.title}</b><br>
${p.price}<br>

<button class="small edit" onclick="editProduct('${d.id}','${p.title}','${p.price}','${p.image}','${p.link}')">Edit</button>

<button class="small delete" onclick="deleteProduct('${d.id}')">Delete</button>

</div>
`;

}

});

}

/* ================= DELETE ================= */
window.deleteProduct = async function(id){
await deleteDoc(doc(db,"products",id));
alert("Deleted ✔");
searchProduct();
}

/* ================= EDIT + UPDATE ================= */
window.editProduct = function(id,title,price,image,link){

document.getElementById("title").value = title;
document.getElementById("price").value = price;
document.getElementById("image").value = image;
document.getElementById("link").value = link;

/* change button */
window.updateId = id;

}

/* ================= UPDATE ================= */
window.updateProduct = async function(){

if(!window.updateId){
alert("Select product first");
return;
}

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;
let link  = document.getElementById("link").value;

await updateDoc(doc(db,"products",window.updateId),{
title,
price,
image,
link
});

alert("Updated ✔");

window.updateId = null;

searchProduct();
}

</script>

<!-- UPDATE BUTTON -->
<button onclick="updateProduct()" style="background:orange;">Update Product</button>

</body>
</html>
