<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math - Ultimate Responsive Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=500;700;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* দৈর্ঘ্য বা উচ্চতা আরও কমানো মনিটর বোর্ড */
        .monitor-board {
            background: radial-gradient(circle at center, rgba(30, 27, 75, 0.4) 0%, rgba(3, 7, 18, 0.9) 100%);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8),
                        0 0 40px rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease-in-out;
        }

        /* ফুলস্ক্রিন মোডে পুরো স্ক্রিন জুড়েই থাকবে */
        :fullscreen .monitor-board {
            width: 100vw !important;
            height: 100vh !important;
            max-height: 100vh !important;
            border: none !important;
            border-radius: 0px !important;
            padding: 2rem !important;
            box-sizing: border-box;
        }

        .number-pulse {
            animation: pulseScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pulseScale {
            0% { transform: scale(0.6); opacity: 0; filter: blur(4px); }
            70% { transform: scale(1.05); opacity: 0.9; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ছোট দৈর্ঘ্যের স্ক্রিনের সাথে সামঞ্জস্যপূর্ণ ফন্ট সাইজ */
        .responsive-number {
            font-size: clamp(90px, 15vw, 200px); 
            line-height: 0.85;
        }

        :fullscreen .responsive-number {
            font-size: clamp(120px, 25vh, 260px);
        }

        .responsive-word {
            font-size: clamp(28px, 5.5vw, 85px); 
            line-height: 1.1;
        }

        :fullscreen .responsive-word {
            font-size: clamp(40px, 8vh, 105px);
        }

        .letter-span {
            transition: all 0.2s ease-in-out;
            display: inline-block;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-3 sm:p-6 md:p-10 text-white">

    <!-- মেইন কন্টেইনার -->
    <div class="w-full max-w-6xl flex flex-col justify-center my-auto">
        
        <!-- মূল গেম কার্ড -->
        <div class="glass-card w-full rounded-[2.5rem] p-5 sm:p-8 md:p-10 text-center shadow-[0_30px_100px_rgba(0,0,0,0.6)] border border-white/10 relative overflow-hidden flex flex-col justify-between">
            
            <!-- টপ হেডার সেকশন -->
            <div class="mb-4">
                <h1 class="text-2xl sm:text-3xl md:text-5xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-400 drop-shadow-sm">
                    MENTAL MATH
                </h1>
                <div class="h-10 mt-1 flex items-center justify-center">
                    <p id="status-text" class="text-xs sm:text-sm md:text-base text-slate-400 font-bold tracking-widest uppercase px-4 bg-white/5 py-1 rounded-full border border-white/5">
                        Smash START to begin!
                    </p>
                </div>
            </div>

            <!-- মনিটর বোর্ড (দৈর্ঘ্য বা min-h আরও কমানো হয়েছে) -->
            <div id="monitor-area" class="monitor-board min-h-[220px] sm:min-h-[280px] md:min-h-[320px] lg:min-h-[360px] w-full flex flex-col items-center justify-center relative mb-5 rounded-[2rem] border-2 border-indigo-500/10 p-4 overflow-hidden">
                
                <!-- ব্যাকগ্রাউন্ড গ্লো ইফেক্টস -->
                <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/10 via-transparent to-cyan-500/5 pointer-events-none"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] sm:w-[600px] h-[150px] sm:h-[220px] bg-indigo-600/10 rounded-full blur-[80px] pointer-events-none"></div>
                
                <!-- কন্টেন্ট ডিসপ্লে এরিয়া -->
                <div class="w-full max-w-full flex flex-col items-center justify-center gap-3 z-10 box-border">
                    <div id="game-row-container" class="w-full flex items-center justify-center transition-all duration-300">
                        <!-- বড় সংখ্যা ডিসপ্লে -->
                        <div id="display" class="responsive-number font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-300 select-none drop-shadow-[0_12px_25px_rgba(0,0,0,0.7)]">
                            🧠
                        </div>
                    </div>
                    <!-- ইংরেজি বানান ডিসপ্লে -->
                    <div id="english-word-display" class="responsive-word font-black tracking-wide text-indigo-400 number-pulse select-none drop-shadow-[0_12px_25px_rgba(99,102,241,0.4)] uppercase text-center w-full break-words px-4"></div>
                </div>
            </div>

            <!-- কন্ট্রোল বাটন্স সেকশন -->
            <div class="w-full max-w-3xl self-center">
                <div class="flex flex-row gap-3 sm:gap-4 w-full items-stretch">
                    <!-- রিসেট বাটন -->
                    <button id="reset-btn" class="bg-rose-600/90 hover:bg-rose-600 text-white font-black px-4 sm:px-6 py-3.5 rounded-2xl transition-all duration-300 shadow-lg shadow-rose-600/20 active:scale-[0.95] text-xs sm:text-base flex items-center justify-center gap-1.5 tracking-wider shrink-0 border border-rose-500/30">
                        🛑 RESET
                    </button>
                    
                    <!-- ফুলস্ক্রিন বাটন -->
                    <button id="fullscreen-btn" class="bg-slate-800 hover:bg-slate-700 text-white font-black px-4 sm:px-6 py-3.5 rounded-2xl transition-all duration-300 shadow-lg active:scale-[0.95] text-xs sm:text-base flex items-center justify-center gap-1.5 tracking-wider shrink-0 border border-white/10">
                        📺 FULLSCREEN
                    </button>

                    <!-- স্টার্ট বাটন -->
                    <button id="action-btn" class="flex-1 bg-gradient-to-r from-cyan-500 via-indigo-500 to-purple-600 hover:opacity-95 text-white font-black py-3.5 px-5 rounded-2xl transition-all duration-300 shadow-xl shadow-indigo-500/20 active:scale-[0.97] text-sm sm:text-lg md:text-xl tracking-widest uppercase border border-white/10">
                        START GAME
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const display = document.getElementById('display');
        const englishWordDisplay = document.getElementById('english-word-display');
        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('action-btn');
        const resetBtn = document.getElementById('reset-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const monitorArea = document.getElementById('monitor-area');

        let currentNumber = 1;
        let gameTimeout = null;
        let isRunning = false;
        let femaleVoice = null;
        let highlightIntervals = []; 
        const defaultSpeed = 2000; 

        // ফুলস্ক্রিন হ্যান্ডলিং লজিক
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (monitorArea.requestFullscreen) {
                    monitorArea.requestFullscreen();
                } else if (monitorArea.webkitRequestFullscreen) { /* Safari */
                    monitorArea.webkitRequestFullscreen();
                } else if (monitorArea.msRequestFullscreen) { /* IE11 */
                    monitorArea.msRequestFullscreen();
                }
                fullscreenBtn.innerHTML = "❌ EXIT FULL";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
                fullscreenBtn.innerHTML = "📺 FULLSCREEN";
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = "📺 FULLSCREEN";
            }
        });

        function initVoiceEngine() {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                femaleVoice = voices.find(v => 
                    v.name.includes('Google US English Female') || 
                    v.name.includes('Microsoft Zira') || 
                    v.name.includes('Samantha') ||
                    (v.lang.includes('en') && v.name.toLowerCase().includes('female'))
                ) || voices.find(v => v.lang.includes('en-US')) || voices.find(v => v.lang.includes('en'));
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = initVoiceEngine;
            initVoiceEngine();
        }

        function renderWordWithSpans(wordText) {
            englishWordDisplay.innerHTML = "";
            wordText.split("").forEach((char, index) => {
                const span = document.createElement("span");
                span.innerText = char;
                span.id = `char-${index}`;
                span.className = "letter-span text-indigo-400 font-black"; 
                englishWordDisplay.appendChild(span);
            });
        }

        function highlightLetterAt(index, fullWordLength) {
            for (let i = 0; i < fullWordLength; i++) {
                const el = document.getElementById(`char-${i}`);
                if (el) el.className = "letter-span text-indigo-400 font-black transform scale-100";
            }
            const activeEl = document.getElementById(`char-${index}`);
            if (activeEl) {
                activeEl.className = "letter-span text-rose-500 font-black scale-110 drop-shadow-[0_0_15px_rgba(244,63,94,0.6)]";
            }
        }

        function clearAllHighlights() {
            highlightIntervals.forEach(id => clearTimeout(id));
            highlightIntervals = [];
        }

        function playSyncedVoice(number, fullWord, onEndCallback) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                clearAllHighlights();

                const numUtterance = new SpeechSynthesisUtterance(`${number}`);
                if (femaleVoice) numUtterance.voice = femaleVoice;
                numUtterance.rate = 0.75;
                numUtterance.pitch = 1.15;

                numUtterance.onend = function() {
                    if (!isRunning) return;

                    const cleanWord = fullWord.replace(/-/g, ' '); 
                    const spellingText = cleanWord.split('').join(', ');

                    const spellingUtterance = new SpeechSynthesisUtterance(spellingText);
                    if (femaleVoice) spellingUtterance.voice = femaleVoice;
                    spellingUtterance.rate = 0.60; 
                    spellingUtterance.pitch = 1.15;

                    let delayTime = 100; 

                    fullWord.split("").forEach((char, idx) => {
                        if (char !== " " && char !== "-") {
                            let tid = setTimeout(() => {
                                if (isRunning) highlightLetterAt(idx, fullWord.length);
                            }, delayTime);
                            highlightIntervals.push(tid);
                            delayTime += 460; 
                        } else {
                            delayTime += 200;
                        }
                    });

                    spellingUtterance.onend = function() {
                        if (!isRunning) return;

                        clearAllHighlights();
                        renderWordWithSpans(fullWord); 
                        
                        const finalUtterance = new SpeechSynthesisUtterance(fullWord);
                        if (femaleVoice) finalUtterance.voice = femaleVoice;
                        finalUtterance.rate = 0.75;
                        finalUtterance.pitch = 1.15;

                        finalUtterance.onend = function() {
                            if (isRunning && typeof onEndCallback === 'function') {
                                onEndCallback();
                            }
                        };
                        window.speechSynthesis.speak(finalUtterance);
                    };

                    window.speechSynthesis.speak(spellingUtterance);
                };

                window.speechSynthesis.speak(numUtterance);
            } else {
                if (typeof onEndCallback === 'function') onEndCallback();
            }
        }

        function numberToEnglishWords(num) {
            if (num === 0) return "ZERO";
            const ones = ["", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            
            if (num < 20) return ones[num];
            if (num < 100) return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? " " + ones[num % 10] : "");
            if (num === 100) return "ONE HUNDRED";
            return num.toString();
        }

        function triggerGlobalReset() {
            clearTimeout(gameTimeout);
            clearAllHighlights();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            isRunning = false;
            currentNumber = 1;
            
            display.innerText = "🧠";
            display.className = "responsive-number font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-300 select-none drop-shadow-[0_15px_30px_rgba(0,0,0,0.7)]";
            englishWordDisplay.innerHTML = "";
            
            actionBtn.classList.remove('hidden');
            statusText.className = "text-xs sm:text-sm md:text-base text-slate-400 font-bold tracking-widest uppercase px-4 bg-white/5 py-1.5 rounded-full border border-white/5";
            statusText.innerText = "Smash START to begin!";
        }

        function startInfiniteGame() {
            if (isRunning) return;
            isRunning = true;
            currentNumber = 1;
            
            actionBtn.classList.add('hidden');
            
            statusText.className = "text-xs sm:text-sm md:text-base text-amber-400 font-black tracking-widest uppercase animate-pulse px-4 bg-amber-500/10 py-1 rounded-full border border-amber-500/20";
            statusText.innerText = "GET READY...";
            
            display.innerText = "READY";
            display.className = "text-2xl sm:text-3xl md:text-4xl font-black text-amber-400 number-pulse select-none z-10 drop-shadow-[0_0_20px_rgba(245,158,11,0.4)]";
            englishWordDisplay.innerText = "STARTING";
            
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            const introUtterance = new SpeechSynthesisUtterance("Get ready. Starting now.");
            if (femaleVoice) introUtterance.voice = femaleVoice;
            introUtterance.rate = 0.8;
            introUtterance.onend = function() {
                setTimeout(() => {
                    statusText.className = "text-xs sm:text-sm md:text-base text-emerald-400 font-black tracking-widest uppercase px-4 bg-emerald-500/10 py-1 rounded-full border border-emerald-500/20";
                    statusText.innerText = "STREAM RUNNING";
                    
                    display.innerText = "GO!";
                    display.className = "text-3xl sm:text-4xl md:text-5xl font-black text-emerald-400 number-pulse select-none z-10 drop-shadow-[0_0_30px_rgba(16,185,129,0.5)]";
                    englishWordDisplay.innerText = "NOW";
                    
                    gameTimeout = setTimeout(runStreamLoop, 1000);
                }, 500);
            };
            window.speechSynthesis.speak(introUtterance);
        }

        function runStreamLoop() {
            if (!isRunning) return;

            if (currentNumber <= 100) {
                display.innerText = currentNumber;
                display.className = "responsive-number font-black text-transparent bg-clip-text bg-gradient-to-b from-cyan-300 to-cyan-500 number-pulse select-none z-10 drop-shadow-[0_0_25px_rgba(6,182,212,0.5)]";
                
                const fullWord = numberToEnglishWords(currentNumber);
                renderWordWithSpans(fullWord);
                
                playSyncedVoice(currentNumber, fullWord, () => {
                    currentNumber++;
                    gameTimeout = setTimeout(runStreamLoop, defaultSpeed);
                });

            } else {
                display.innerText = "🎉";
                englishWordDisplay.innerText = "DONE";
                englishWordDisplay.className = "responsive-word font-black tracking-wide text-emerald-400 select-none uppercase text-center w-full drop-shadow-[0_0_25px_rgba(16,185,129,0.4)]";
                statusText.innerText = "STREAM FINISHED SUCCESSFULLY!";
                statusText.className = "text-xs sm:text-sm md:text-base text-emerald-400 font-black tracking-widest px-4 bg-emerald-500/10 py-1 rounded-full border border-emerald-500/20";
                
                const endUtterance = new SpeechSynthesisUtterance("Excellent. Stream finished successfully.");
                if (femaleVoice) endUtterance.voice = femaleVoice;
                endUtterance.onend = function() {
                    actionBtn.classList.remove('hidden');
                    isRunning = false;
                };
                window.speechSynthesis.speak(endUtterance);
            }
        }

        actionBtn.addEventListener('click', startInfiniteGame);
        resetBtn.addEventListener('click', triggerGlobalReset);
    </script>
</body>
</html>
