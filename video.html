<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung M35 Ultra Video Frame</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* TOP CONTROLS */
.top-controls{
display:flex;
gap:10px;
margin-bottom:10px;
transition:0.3s;
}

.top-controls.hide{
opacity:0;
pointer-events:none;
transform:translateY(-20px);
}

.top-controls button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
background:#ff2d55;
color:#fff;
}

/* PHONE */
.phone{
width:380px;
height:760px;
padding:10px;
border-radius:40px;
background:#111;
position:relative;
overflow:hidden;
box-shadow:
-20px 0 50px rgba(0,191,255,.5),
20px 0 50px rgba(255,0,255,.5),
0 0 30px rgba(255,255,255,.15);
}

/* SCREEN */
.screen{
position:relative;
width:100%;
height:100%;
background:#000;
border-radius:32px;
overflow:hidden;
}

/* DISPLAY */
.display{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.display video{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

/* PLAY OVERLAY */
.play-overlay{
position:absolute;
z-index:10;
background:rgba(0,0,0,.5);
color:#fff;
border:none;
border-radius:50%;
width:70px;
height:70px;
font-size:20px;
cursor:pointer;
display:none;
}

/* STATUS */
.status-bar{
position:absolute;
top:8px;
left:15px;
right:15px;
height:24px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
font-size:13px;
font-weight:600;
z-index:5;
transition:0.3s;
}

.status-bar.hide{
opacity:0;
}

/* CAMERA */
.camera-hole{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:14px;
height:14px;
background:#000;
border:2px solid #1a1a1a;
border-radius:50%;
z-index:10;
}

/* HOME BAR */
.home-bar{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
width:130px;
height:4px;
background:rgba(255,255,255,.9);
border-radius:50px;
z-index:5;
transition:0.3s;
}

.home-bar.hide{
opacity:0;
}

/* INSIDE CONTROLS */
.controls{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
align-items:center;
transition:0.3s;
}

.controls.hide{
opacity:0;
pointer-events:none;
transform:translateY(20px);
}

input, button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

button{
background:#00aaff;
color:#fff;
}

input[type="range"]{
width:220px;
}
</style>
</head>

<body>

<!-- TOP BUTTONS -->
<div class="top-controls" id="topControls">
<input type="file" id="file" accept="video/*">
<button onclick="togglePlay()">▶ Play / Pause</button>
<button onclick="toggleFullscreen()">📺 Fullscreen</button>
</div>

<div class="phone">

<div class="screen">

<div class="display">
<video id="video" onclick="togglePlay()"></video>

<button class="play-overlay" id="overlayBtn" onclick="togglePlay()">▶</button>
</div>

<div class="camera-hole"></div>

<div class="status-bar" id="statusBar">
<div>9:41</div>
<div>📶 5G 🔋100%</div>
</div>

<div class="home-bar" id="homeBar"></div>

</div>
</div>

<!-- INSIDE CONTROLS -->
<div class="controls" id="controls">
<input type="range" id="seek" value="0" min="0" step="0.1">
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<script>

let video = document.getElementById("video");
let file = document.getElementById("file");
let seek = document.getElementById("seek");
let volume = document.getElementById("volume");

let topControls = document.getElementById("topControls");
let controls = document.getElementById("controls");
let overlayBtn = document.getElementById("overlayBtn");
let statusBar = document.getElementById("statusBar");
let homeBar = document.getElementById("homeBar");

file.addEventListener("change", function(){
let videoFile = this.files[0];
if(videoFile){
video.src = URL.createObjectURL(videoFile);
video.style.display = "block";
overlayBtn.style.display = "block";
}
});

/* FIXED TOGGLE PLAY */
function togglePlay(){
if(!video.src) return;

if(video.paused){
video.play();
hideUI();
overlayBtn.style.display = "none";
}else{
video.pause();
showUI();
overlayBtn.style.display = "block";
overlayBtn.innerHTML = "▶";
}
}

/* UI HIDE WHEN PLAYING */
function hideUI(){
topControls.classList.add("hide");
controls.classList.add("hide");
statusBar.classList.add("hide");
homeBar.classList.add("hide");
}

/* UI SHOW WHEN PAUSED */
function showUI(){
topControls.classList.remove("hide");
controls.classList.remove("hide");
statusBar.classList.remove("hide");
homeBar.classList.remove("hide");
}

/* SEEK */
video.addEventListener("timeupdate", ()=>{
seek.value = video.currentTime;
});

video.addEventListener("loadedmetadata", ()=>{
seek.max = video.duration;
});

seek.addEventListener("input", ()=>{
video.currentTime = seek.value;
});

/* VOLUME */
volume.addEventListener("input", ()=>{
video.volume = volume.value;
});

/* FULLSCREEN */
function toggleFullscreen(){
if(video.requestFullscreen){
video.requestFullscreen();
}
}

</script>

</body>
</html>
