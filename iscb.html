<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নূরানী পদ্ধতিতে ব্যবহারিক নামাজ শিক্ষা</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #333333;
            color: #ffffff;
            overflow: hidden;
        }

        /* 📱 বামপাশের সাইডবার মেনু (ডেক্সটপ ও মোবাইলের জন্য রেসপনসিভ) */
        .sidebar {
            width: 280px;
            background-color: #222222;
            border-right: 1px solid #444444;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h3 {
            padding: 0 20px 15px 20px;
            font-size: 16px;
            border-bottom: 1px solid #444444;
            margin-bottom: 15px;
            color: #aaaaaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* মোবাইলে সূচিপত্র বন্ধ করার জন্য ক্লোজ বাটন */
        .close-btn {
            display: none;
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar a {
            padding: 12px 20px;
            text-decoration: none;
            color: #cccccc;
            font-size: 14px;
            transition: background 0.2s;
            display: block;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #444444;
            color: #ffffff;
        }

        /* ডানপাশের মূল কন্টেন্ট এরিয়া */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* উপরের টুলবার */
        .toolbar {
            height: 50px;
            background-color: #2b2b2b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #444444;
            font-size: 14px;
        }

        /* মোবাইল মেনু টগল বাটন (☰) */
        .menu-toggle {
            background: #444444;
            border: none;
            color: white;
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            display: none; /* ডেক্সটপে লুকোনো থাকবে */
        }

        .file-name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* পিডিএফ ফ্রেমের এরিয়া */
        .viewer-container {
            flex: 1;
            background-color: #525659;
            position: relative;
            overflow: hidden;
        }

        /* গুগল ড্রাইভের আইফ্রেম */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🛡️ পপ-আউট বাটন প্রোটেকশন লেয়ার */
        .block-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 180px;  
            height: 60px;   
            background-color: transparent; 
            z-index: 999;   
            pointer-events: auto; 
        }

        /* 📱 মোবাইল রেসপনসিভ মিডিয়া কুয়েরি (Media Query) */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block; /* মোবাইলে মেনু বাটন দেখাবে */
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(-100%); /* স্ক্রিনের বাইরে লুকিয়ে থাকবে */
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }

            .sidebar.active {
                transform: translateX(0); /* বাটনে চাপ দিলে সামনে আসবে */
            }

            .close-btn {
                display: block; /* মোবাইলে চ্যাপ্টার বন্ধের বাটন দেখাবে */
            }

            .block-overlay {
                width: 120px; /* মোবাইলে বাটনগুলোর সাইজ অনুযায়ী অ্যাডজাস্টমেন্ট */
                height: 50px;
            }
        }
    </style>
</head>
<body>

    <!-- বামপাশের চ্যাপ্টার মেনু -->
    <div class="sidebar" id="sidebarMenu">
        <h3>
            <span>সূচিপত্র (Chapters)</span>
            <button class="close-btn" onclick="toggleMenu()">✕</button>
        </h3>
        <a href="#" class="active" onclick="closeMenuOnMobile()">1st Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">2nd Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">3rd Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">4th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">5th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">6th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">7th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">8th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">9th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">10th Chapter</a>
        <a href="#" onclick="closeMenuOnMobile()">11th Chapter Calendar</a>
        <a href="#" onclick="closeMenuOnMobile()">Digitalization</a>
        <a href="#" onclick="closeMenuOnMobile()">WRITER</a>
    </div>

    <!-- ডানপাশের মূল পিডিএফ এরিয়া -->
    <div class="main-content">
        <!-- উপরের কন্ট্রোল বার -->
        <div class="toolbar">
            <!-- মোবাইলের জন্য মেনু বাটন -->
            <button class="menu-toggle" onclick="toggleMenu()">☰ সূচি</button>
            <div class="file-name">01-Namaz Inner</div>
            <div>⚙️</div>
        </div>

        <div class="viewer-container">
            <!-- 🛡️ পপ-আউট বাটন লক রাখার অদৃশ্য দেয়াল -->
            <div class="block-overlay"></div>
            
            <!-- আপনার দেওয়া গুগল ড্রাইভ পিডিএফ লিংক -->
            <iframe src="https://drive.google.com/file/d/1PqfIsTM7_YTr1gdVWjdYF36zYu4ziXti/preview" allow="autoplay"></iframe>
        </div>
    </div>

    <!-- 🛠️ মোবাইল মেনু কন্ট্রোল করার ছোট জাভাস্ক্রিপ্ট কোড -->
    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebarMenu');
            sidebar.classList.toggle('active');
        }

        // মোবাইলে কোনো চ্যাপ্টারে ক্লিক করলে মেনুটি নিজে থেকেই বন্ধ হয়ে যাবে
        function closeMenuOnMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebarMenu').classList.remove('active');
            }
        }
    </script>

</body>
</html>
