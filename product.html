<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<!-- ✅ Mobile Fix (IMPORTANT) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Products</title>

<style>

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    background:#f4f4f4;
    font-family:Arial;
}

/* ✅ FIX: mobile stable grid */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:10px;
    padding:10px;
    width:100%;
}

/* card fix */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    width:100%;
}

/* image fix */
.card img{
    width:100%;
    height:130px;
    object-fit:cover;
    display:block;
}

.card h3{
    font-size:12px;
    padding:8px;
    margin:0;
}

.card h3 a{
    text-decoration:none;
    color:black;
    word-break:break-word;
}

.price{
    padding:0 8px;
    font-weight:bold;
    color:red;
}

/* button */
.buy-btn{
    display:block;
    background:#ffcc00;
    text-align:center;
    padding:10px;
    text-decoration:none;
    font-weight:bold;
}

/* extra mobile safety */
@media (max-width:480px){

    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:8px;
        padding:8px;
    }

    .card img{
        height:120px;
    }

    .card h3{
        font-size:11px;
    }

    .buy-btn{
        padding:8px;
        font-size:13px;
    }
}

</style>
</head>

<body>

<h2 style="text-align:center;">All Products</h2>

<div class="grid" id="grid"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let grid = document.getElementById("grid");

/* image fix */
function fixImage(url){

    if(!url) return "";

    if(url.includes("github.com") && url.includes("/blob/")){
        return url
        .replace("github.com", "raw.githubusercontent.com")
        .replace("/blob/", "/");
    }

    if(url.includes("drive.google.com")){

        let fileId = "";

        let match1 = url.match(/\/d\/([^\/]+)/);
        if(match1) fileId = match1[1];

        let match2 = url.match(/[?&]id=([^&]+)/);
        if(!fileId && match2) fileId = match2[1];

        if(fileId){
            return `https://lh3.googleusercontent.com/d/${fileId}`;
        }
    }

    return url;
}

/* render fix (safer) */
if(products.length === 0){
    grid.innerHTML = "<p style='padding:10px'>No products found</p>";
}
else{
    let html = "";

    products.forEach(p => {

        html += `
        <div class="card">

            <img src="${fixImage(p.image)}" alt="${p.title || ''}">

            <h3>
                <a href="${p.link}" target="_blank">
                    ${p.title || ''}
                </a>
            </h3>

            <div class="price">${p.price || ''}</div>

            <a href="${p.link}" target="_blank" class="buy-btn">Buy Now</a>

        </div>
        `;
    });

    grid.innerHTML = html;
}

</script>

</body>
</html>
