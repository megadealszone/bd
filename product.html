<!DOCTYPE html>
<html lang="bn">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>

/* ================= DESIGN (UNCHANGED STYLE) ================= */

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

h2{
    text-align:center;
    padding:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    padding:10px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* IMAGE */
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

/* TITLE */
.info{
    padding:8px;
    font-size:12px;
}

/* PRICE */
.price{
    color:#B12704;
    font-weight:bold;
    padding:0 8px;
}

/* BUTTON */
.btn{
    display:block;
    background:#FFD814;
    text-align:center;
    padding:10px;
    text-decoration:none;
    font-weight:bold;
    color:#111;
}

</style>
</head>

<body>

<h2>🔥 Featured Products</h2>

<!-- PRODUCTS SHOW AREA -->
<div class="grid" id="grid"></div>

<!-- ======================================================
🔥 FIREBASE SCRIPT START (IMPORTANT SECTION)
👉 এখানে product data load হবে
====================================================== -->

<script type="module">

/* ================= FIREBASE IMPORT ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======================================================
🔥 STEP 1: SAME CONFIG (dashboard এর মতোই)
====================================================== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY_HERE",
  authDomain: "YOUR_AUTH_DOMAIN_HERE",
  projectId: "YOUR_PROJECT_ID_HERE",
  appId: "YOUR_APP_ID_HERE"
};

/* ================= INIT FIREBASE ================= */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= GRID ELEMENT ================= */
let grid = document.getElementById("grid");

/* ======================================================
🔥 STEP 2: LIVE DATA LOAD (REAL TIME)
👉 Firebase থেকে product auto load হবে
====================================================== */
onSnapshot(collection(db, "products"), (snap)=>{

grid.innerHTML = "";

snap.forEach(doc=>{

let p = doc.data();

grid.innerHTML += `
<div class="card">

<img src="${p.image}">

<div class="info">
${p.title}
</div>

<div class="price">${p.price}</div>

<a class="btn" href="${p.link}" target="_blank">Buy Now</a>

</div>
`;

});

});

</script>

</body>
</html>
