<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    display:block;
}

.card h3{
    font-size:12px;
    margin:0;
    padding:8px;
}

.card h3 a{
    text-decoration:none;
    color:black;
}

.price{
    padding:0 8px;
    color:red;
    font-weight:bold;
}

.buy-btn{
    display:block;
    background:#ffcc00;
    text-align:center;
    padding:8px;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center;">All Products</h2>

<div class="grid" id="grid"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let grid = document.getElementById("grid");

function render(){

    if(products.length === 0){
        grid.innerHTML = "<p style='padding:10px'>No products found</p>";
        return;
    }

    let html = "";

    products.forEach(p => {

        html += `
        <div class="card">

            <img src="${p.image}" alt="">

            <h3>
                <a href="${p.link}" target="_blank">
                    ${p.title}
                </a>
            </h3>

            <div class="price">${p.price}</div>

            <a class="buy-btn" href="${p.link}" target="_blank">Buy Now</a>

        </div>
        `;
    });

    grid.innerHTML = html;
}

render();

</script>

</body>
</html>
