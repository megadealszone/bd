<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Products</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card h3{
    font-size:12px;
    padding:10px;
    margin:0;
    background:#fff;
}

/* Title link */
.card h3 a{
    text-decoration:none;
    color:black;
    transition:0.2s;
}

.card h3 a:hover{
    color:#ff4d4d;
}

.price{
    padding:0 10px;
    font-weight:bold;
    color:red;
}

/* ✅ ONLY Buy Now button style */
.buy-btn{
    display:block;
    background:#ffcc00;
    text-align:center;
    padding:10px;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center;">All Products</h2>

<div class="grid" id="grid"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let grid = document.getElementById("grid");

/* ✅ GitHub + Google Drive image support */
function fixImage(url){

    // GitHub image
    if(url.includes("github.com") && url.includes("/blob/")){
        return url
        .replace("github.com", "raw.githubusercontent.com")
        .replace("/blob/", "/");
    }

    // Google Drive image
    if(url.includes("drive.google.com")){

        let fileId = "";

        // file/d/FILE_ID/view
        let match1 = url.match(/\/d\/([^\/]+)/);

        if(match1 && match1[1]){
            fileId = match1[1];
        }

        // open?id=FILE_ID
        let match2 = url.match(/[?&]id=([^&]+)/);

        if(!fileId && match2 && match2[1]){
            fileId = match2[1];
        }

        // direct image link
        if(fileId){
            return `https://lh3.googleusercontent.com/d/${fileId}`;
        }
    }

    return url;
}

products.forEach(p => {

grid.innerHTML += `
<div class="card">

<img src="${fixImage(p.image)}" alt="${p.title}">

<h3>
<a href="${p.link}" target="_blank">
${p.title}
</a>
</h3>

<div class="price">${p.price}</div>

<a href="${p.link}" target="_blank" class="buy-btn">Buy Now</a>

</div>
`;

});

</script>

</body>
</html>
```
