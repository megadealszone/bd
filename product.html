<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}

h2{text-align:center;padding:15px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.info{padding:8px;font-size:12px;}

.price{color:#B12704;font-weight:bold;padding:0 8px;}

.btn{
display:block;
background:#FFD814;
text-align:center;
padding:10px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<h2>🔥 Featured Products</h2>
<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKhxr7tDwWyVH-lO-iJsToZhkw5i_tclU",
  authDomain: "megadealszone-49103.firebaseapp.com",
  projectId: "megadealszone-49103",
  storageBucket: "megadealszone-49103.firebasestorage.app",
  appId: "1:457042872489:web:c6061f918d4a48a77ac1b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let grid=document.getElementById("grid");

onSnapshot(collection(db,"products"),(snap)=>{

grid.innerHTML="";

snap.forEach(doc=>{

let p=doc.data();

grid.innerHTML+=`
<div class="card">

<img src="${p.image}">

<div class="info">${p.title}</div>

<div class="price">${p.price}</div>

<a class="btn" href="${p.link}" target="_blank">Buy Now</a>

</div>
`;

});

});

</script>

</body>
</html>
