<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>পাসওয়ার্ড দিয়ে প্রবেশ করুন</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f9f9f9;
      text-align: center;
    }
    input[type="password"] {
      padding: 10px;
      width: 250px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 5px;
      transition: border-color 0.3s ease;
    }
    input[type="password"]:focus {
      border-color: #007BFF;
      outline: none;
    }
    button {
      padding: 10px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      transition: box-shadow 0.3s ease, background-color 0.3s ease;
      user-select: none;
    }
    button:hover {
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.5);
      background-color: #0056b3;
    }
    button:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.5);
    }
    #error {
      color: red;
      margin-top: 10px;
      font-weight: bold;
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- লগইন ফর্ম -->
  <div id="loginSection">
    <h2> পাসওয়ার্ড দিয়ে লগইন করুন  </h2>
    <form id="loginForm">
      <input type="password" id="passInput" placeholder="পাসওয়ার্ড লিখুন" required />
      <button type="submit">Login</button>
      <p id="error"></p>
    </form>
  </div>

  <script>
    const correctPass = "5101";
    const errorEl = document.getElementById("error");
    const loginForm = document.getElementById("loginForm");

    loginForm.onsubmit = function(e) {
      e.preventDefault();
      const pass = loginForm.passInput.value.trim();
      if(pass === correctPass) {
        // সঠিক পাসওয়ার্ড হলে নির্দিষ্ট লিংকে নিয়ে যাবে
        window.location.href = "https://megadealszone.github.io/bd/dashboard.html";
      } else {
        errorEl.innerText = "❌ Wrong password! Enter the correct word password";
      }
    };
  </script>

</body>
</html>
