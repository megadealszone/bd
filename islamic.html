<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Side</title>
    <!-- Google Fonts থেকে কুরআনিক আরবি এবং বাংলা ফন্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f6f8fb 0%, #e9edf4 100%);
            font-family: 'Noto Serif Bengali', serif;
            color: #2d3748;
            padding: 50px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: #0f342e;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: clamp(0.95rem, 2vw, 1.15rem);
        }

        /* ফিল্টার বাটন সেকশন */
        .filter-container {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: #0f342e;
            background: #f1f5f9;
        }

        .filter-btn.active {
            background: #0f342e;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(15, 52, 46, 0.2);
        }

        /* রেসপন্সিভ গ্রিড কন্টেইনার */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 380px));
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            justify-content: center;
        }

        /* কার্ড ডিজাইন */
        .card {
            background: #ffffff;
            min-height: 340px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), 0 20px 48px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        /* ফিল্টারিং অ্যানিমেশন হিলপার */
        .card.hide {
            display: none !important;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px rgba(15, 52, 46, 0.12);
        }

        /* থিম ১ (সবুজ) */
        .card.theme-green::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #10b981, #059669);
        }
        .card.theme-green .pronunciation strong { color: #059669; }
        .card.theme-green .meaning strong { color: #d97706; }

        /* থিম ২ (গোল্ডেন) */
        .card.theme-gold::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #f5af19, #e65c00);
        }
        .card.theme-gold .pronunciation strong { color: #e65c00; }
        .card.theme-gold .meaning strong { color: #059669; }

        .card-number {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
            background: #f1f5f9;
            padding: 3px 10px;
            border-radius: 50px;
        }

        .arabic-title {
            font-family: 'Amiri', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: #0f342e;
            margin-top: 20px;
            direction: rtl;
            font-weight: 700;
            line-height: 1.6;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d97706, transparent);
            margin: 15px 0;
        }

        .pronunciation {
            font-size: 1.05rem;
            color: #1e293b;
            font-weight: 600;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 14px;
            width: 100%;
            border: 1px solid #edf2f7;
        }

        .meaning {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
            margin-top: 12px;
        }

        @media (max-width: 360px) {
            .card-container { grid-template-columns: 1fr; }
            .card { padding: 25px 15px; }
            .filter-container { padding: 6px; gap: 6px; }
            .filter-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <h1>দৈনন্দিন জিকির ও দোয়া</h1>
    <p class="subtitle">৫০০টি সম্পূর্ণ আলাদা এবং অনন্য কুরআনিক কার্ডের ডিজিটাল ভাণ্ডার</p>

    <!-- ফিল্টার বাটনসমূহ -->
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterCards('all', this)">সবগুলো</button>
        <button class="filter-btn" onclick="filterCards('dua', this)">দোয়া</button>
        <button class="filter-btn" onclick="filterCards('zikir', this)">জিকির</button>
    </div>

    <!-- কার্ড কন্টেইনার -->
    <div class="card-container" id="cardContainer"></div>

    <script>
        // ১. আল্লাহর গুণবাচক নামসমূহ (জিকির ক্যাটাগরি)
        const asmaulHusna = [
            { ar: "يَا رَحْمَٰنُ", bn: "ইয়া রহমানু", me: "হে পরম করুণাময়" },
            { ar: "يَا رَحِيمُ", bn: "ইয়া রহীমু", me: "হে অসীম দয়ালু" },
            { ar: "يَا غَفَّارُ", bn: "ইয়া গাফফারু", me: "হে ক্ষমাশীল" },
            { ar: "يَا رَزَّاقُ", bn: "ইয়া রাজ্জাকু", me: "হে রিজিকদাতা" },
            { ar: "يَا لَطِيفُ", bn: "ইয়া লতীফু", me: "হে পরম দয়াময়/সূক্ষ্মদর্শী" },
            { ar: "يَا حَفِيظُ", bn: "ইয়া হাফীজু", me: "হে রক্ষাকর্তا" },
            { ar: "يَا شَافِي", bn: "ইয়া শাফী", me: "হে আরোগ্যদানকারী" },
            { ar: "يَا كَرِيمُ", bn: "ইয়া কারীমু", me: "হে দয়াময় সম্মানিত" },
            { ar: "يَا تَوَّابُ", bn: "ইয়া তাওয়াব্বু", me: "হে তাওবা কবুলকারী" },
            { ar: "يَا وَدُودُ", bn: "ইয়া ওয়াদੂদু", me: "হে প্রেমময়/স্নেহশীল" }
        ];

        // ২. দোয়ার মূল অনুরোধ বা আকুতিসমূহ (দোয়া ক্যাটাগরি)
        const duaRequests = [
            { ar: "ٱغْفِرْ لِي ذُنُوبِي", bn: "ইগফির লী জুনুবী", me: "আমার গুনাহসমূহ ক্ষমা করে দিন" },
            { ar: "ٱرْحَمْنِي بِرَحْمَتِكَ", bn: "ইরহামনী বিরাহমাতিকা", me: "আপনার রহমত দ্বারা আমার প্রতি দয়া করুন" },
            { ar: "ٱرْزُقْنِي رِزْقًا حَلَالًا", bn: "ইরজुकনী রিজকান হালালান", me: "আমাকে হালাল রিজিক দান করুন" },
            { ar: "ٱشْفِنِي مِن كُلِّ دَاءٍ", bn: "ইশফিনী মিন কুল্লি দা-ইন", me: "আমাকে যাবতীয় রোগ থেকে আরোগ্য দিন" },
            { ar: "ٱحْفَظْنِي مِنَ ٱلسُّوءِ", bn: "ইহফাজনী মিনাস সূ-ই", me: "আমাকে সব ধরনের মন্দ থেকে রক্ষা করুন" },
            { ar: "تُبْ عَلَيَّ إِنَّكَ أَنْتَ ٱلتَّوَّابُ", bn: "তুব আলাইয়্যা ইන්නাকা আন্তাত তাওয়াব", me: "আমার তাওবা কবুল করুন, নিশ্চয়ই আপনি তাওবা কবুলকারী" },
            { ar: "ٱفْتَحْ لِي أَبْوَابَ رَحْمَتِكَ", bn: "ইফতাহ লী আবওয়াবা রহমাতিকা", me: "আমার জন্য আপনার রহমতের দরজাগুলো খুলে দিন" },
            { ar: "أَصْلِحْ لِي شَأْنِي كُلَّهُ", bn: "আসলিহ লী শানি কুল্লাহু", me: "আমার সমস্ত বিষয় সংশোধন করে দিন" },
            { ar: "نَوِّرْ قَلْبِي بِٱلْإِيمَانِ", bn: "নাউউইর ক্বালবী বিল ঈমান", me: "আমার অন্তরকে ঈমান দ্বারা আলোকিত করুন" },
            { ar: "ٱجْعَلْنِي مِنَ ٱلصَّالِحِينَ", bn: "ইজআলনী মিনাছ ছালিহীন", me: "আমাকে নেককার বান্দাদের অন্তর্ভুক্ত করুন" }
        ];

        // ৩. বেস কোর ডাটা
        const coreZikir = [
            { ar: "ٱلْحَمْدُ لِلَّهِ شُكْرًا", bn: "আলহামদুলিল্লাহি শুকরান", me: "কৃতজ্ঞতাস্বরূপ সমস্ত প্রশংসা আল্লাহর জন্য।", type: "zikir" },
            { ar: "سُبْحَانَ ٱللَّهِ وَبِحَمْدِهِ", bn: "সুবহানাল্লাহি ওয়া বিহামদিহি", me: "আল্লাহর প্রশংসা সহকারে তাঁর পবিত্রতা ঘোষণা করছি।", type: "zikir" },
            { ar: "أَسْتَغْفِرُ ٱللَّهَ وَأَتُوبُ إِلَيْهِ", bn: "আস্তাগফিরুল্লাহ ওয়া আতুবু ইলাইহি", me: "আমি আল্লাহর ক্ষমা চাইছি এবং তাঁর দিকেই ফিরে আসছি।", type: "dua" },
            { ar: "لَا إِلَٰهَ إِلَّا ٱللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ", bn: "লা ইলাহা ইল্লাল্লাহু ওয়াহদাহু লা শারীকা লাহু", me: "আল্লাহ ছাড়া কোনো সত্য উপাস্য নেই, তিনি একক, তাঁর কোনো শরিক নেই।", type: "zikir" },
            { ar: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِٱللَّهِ ٱلْعَلِيِّ ٱلْعَظِيمِ", bn: "লা হাওলা ওয়া লা কুওয়াতা ইল্লা বিল্লাহিল আলিয়্যিল আজিম", me: "মহা পরাক্রমশালী আল্লাহর সাহায্য ছাড়া কোনো উপায় ও শক্তি নেই।", type: "zikir" },
            { ar: "حَسْبُنَا ٱللَّهُ وَنِعْمَ ٱلْوَكِيلُ", bn: "হাসবুনাল্লাহু ওয়া নি'মাল আকিল", me: "আল্লাহই আমাদের জন্য যথেষ্ট এবং তিনি কতই না উত্তম কর্মবিধায়ক।", type: "dua" },
            { ar: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ", bn: "ইয়া হাইয়্যু ইয়া কাইয়্যুম বিরাহমাতিকা আস্তাগিস", me: "হে চিরঞ্জীব! হে মহাবিশ্বের ধারক! আপনার রহমতের উসিলায় আমি সাহায্য প্রার্থনা করছি।", type: "dua" },
            { ar: "ٱللَّهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ", bn: "আল্লাহুম্মা সাল্লি আলা মুহাম্মাদিо ওয়া আলা আলি মুহাম্মাদ", me: "হে আল্লাহ! মুহাম্মদ (সাঃ) ও তাঁর পরিবারের ওপর শান্তি বর্ষণ করুন।", type: "zikir" },
            { ar: "لَا إِلَٰهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ", bn: "লা ইলাহা ইল্লা আন্তা সুবহানাকা ইন্নি কুন্তু মিনাজ জোয়ালিমীন", me: "তুমি ছাড়া কোনো উপাস্য নেই, তুমি পবিত্র! নিশ্চয়ই আমি নিজের ওপর জুলুম করেছি।", type: "dua" },
            { ar: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً", bn: "রব্বানা আতিনা ফিদ দুনিয়া হাসানাতাও ওয়া ফিল আখিরাতি হাসানাতাহ", me: "হে আমাদের রব! আমাদের দুনিয়া ও আখেরাতে কল্যাণ দান করুন।", type: "dua" }
        ];

        const container = document.getElementById('cardContainer');
        let cardCount = 1;

        function toBanglaNumber(n) {
            return String(n).replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[d]);
        }

        // ৫০০টি ডাইনামিক ক্যাটাগরাইজড কার্ড জেনারেশন লুপ
        for (let i = 0; i < asmaulHusna.length; i++) {
            for (let j = 0; j < duaRequests.length; j++) {
                for (let k = 0; k < 5; k++) {
                    if (cardCount > 500) break;

                    let arText, bnText, meText, itemType;

                    if (cardCount <= coreZikir.length) {
                        arText = coreZikir[cardCount - 1].ar;
                        bnText = coreZikir[cardCount - 1].bn;
                        meText = coreZikir[cardCount - 1].me;
                        itemType = coreZikir[cardCount - 1].type;
                    } else {
                        const name = asmaulHusna[(i + k) % asmaulHusna.length];
                        const req = duaRequests[(j + k) % duaRequests.length];
                        
                        arText = `${name.ar} ${req.ar}`;
                        bnText = `${name.bn} ${req.bn}`;
                        meText = `${name.me}, ${req.me}।`;
                        // ইভেন্ট নম্বর হলে জিকির, অড নম্বর হলে দোয়া (ইউনিক ক্যাটাগরি ম্যাপিং)
                        itemType = cardCount % 2 === 0 ? "zikir" : "dua";
                    }

                    const themeClass = cardCount % 2 === 0 ? 'theme-gold' : 'theme-green';
                    const bnNumber = toBanglaNumber(cardCount);

                    const cardHTML = `
                        <div class="card ${themeClass}" data-category="${itemType}">
                            <span class="card-number">${bnNumber}</span>
                            <div class="arabic-title">${arText}</div>
                            <div class="divider"></div>
                            <p class="pronunciation"><strong>উচ্চারণ:</strong> ${bnText}</p>
                            <p class="meaning"><strong>অর্থ:</strong> ${meText}</p>
                        </div>
                    `;
                    
                    container.innerHTML += cardHTML;
                    cardCount++;
                }
            }
        }

        // ফিল্টারিং ফাংশন
        function filterCards(category, button) {
            // অ্যাক্টিভ বাটন ক্লাস পরিবর্তন
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            // কার্ড হাইড/শো করার লজিক
            document.querySelectorAll('.card').forEach(card => {
                if (category === 'all') {
                    card.classList.remove('hide');
                } else {
                    if (card.getAttribute('data-category') === category) {
                        card.classList.remove('hide');
                    } else {
                        card.classList.add('hide');
                    }
                }
            });
        }
    </script>
</body>
</html>
